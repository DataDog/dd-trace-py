[package]
name = "ddtrace-native"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.release]
lto = true
debug = "line-tables-only"
opt-level = 's'
codegen-units = 1

[features]
crashtracker = ["dep:anyhow", "dep:libdd-crashtracker", "dep:pyo3-ffi", "dep:libc", "dep:libdd-common"]
profiling = ["dep:libdd-profiling-ffi"]
ffe = ["dep:datadog-ffe"]
stats = ["dep:libdd-ddsketch"]

[dependencies]
anyhow = { version = "1.0", optional = true }
libc = { version = "0.2", optional = true }
rand = "0.9"
rustc-hash = "1.1"
serde = "1.0"
datadog-ffe = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", optional = true, version = "1.0.0", features = ["pyo3"] }
serde_json = "1.0"
datadog-remote-config = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-tracer-flare = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-crashtracker = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", optional = true }
libdd-ddsketch = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", optional = true }
libdd-library-config = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-log = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-capabilities-impl = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", features = [
  "stats-obfuscation"
] }
libdd-shared-runtime = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
libdd-profiling-ffi = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", optional = true, features = [
    "cbindgen",
] }
libdd-common = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", optional = true }
libdd-trace-utils = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db" }
pyo3 = { version = "0.28", features = ["extension-module", "anyhow"] }
tracing = { version = "0.1", default-features = false }
pyo3-ffi = { version = "0.28", optional = true }

[build-dependencies]
pyo3-build-config = "0.28"
build_common = { git = "https://github.com/DataDog/libdatadog", rev = "45a451cd8fddfc479cb9357a0602e146016dc8db", features = [
    "cbindgen",
] }

[lib]
name = "_native"
path = "lib.rs"
crate-type = ["cdylib"]
