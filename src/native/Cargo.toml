[package]
name = "ddtrace-native"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.release]
lto = true
debug = "line-tables-only"
opt-level = 's'
codegen-units = 1

[features]
crashtracker = ["dep:anyhow", "dep:libdd-crashtracker", "dep:pyo3-ffi", "dep:libc", "dep:libdd-common"]
profiling = ["dep:libdd-profiling-ffi"]
ffe = ["dep:datadog-ffe"]
stats = ["dep:libdd-ddsketch"]

[dependencies]
anyhow = { version = "1.0", optional = true }
libc = { version = "0.2", optional = true }
rand = "0.9"
serde = "1.0"
# AIDEV-NOTE: libdatadog is pinned to an untagged main-branch SHA (not a tag like v30.0.0) because
# this is the exact commit that bumps libdatadog's pyo3 to 0.28 (required for Python 3.15 support).
# The next tagged release (v31.0.0) also contains this bump, but introduces an unrelated breaking
# change in libdd-data-pipeline (shared runtime, libdatadog#1602) that would require additional
# adaptation in src/native/data_pipeline/mod.rs. Bump to the tag in a follow-up PR after adapting
# to the new trace-exporter runtime API.
datadog-ffe = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", optional = true, version = "1.0.0", features = ["pyo3"] }
serde_json = "1.0"
datadog-remote-config = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
datadog-tracer-flare = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
libdd-crashtracker = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", optional = true }
libdd-ddsketch = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", optional = true }
libdd-library-config = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
libdd-log = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
libdd-profiling-ffi = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", optional = true, features = [
    "cbindgen",
] }
libdd-common = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", optional = true }
libdd-trace-utils = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
libdd-capabilities-impl = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0" }
pyo3 = { version = "0.28", features = ["extension-module", "anyhow"] }
tracing = { version = "0.1", default-features = false }
pyo3-ffi = { version = "0.28", optional = true }

[build-dependencies]
pyo3-build-config = "0.28"
build_common = { git = "https://github.com/DataDog/libdatadog", rev = "5beaea5d939faaccac7204cfabcde7b46a6d35d0", features = [
    "cbindgen",
] }

[lib]
name = "_native"
path = "lib.rs"
crate-type = ["cdylib"]
