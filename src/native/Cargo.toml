[package]
name = "ddtrace-native"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.release]
lto = true
debug = "none"
opt-level = 's'
codegen-units = 1

[features]
crashtracker = ["dep:anyhow", "dep:libdd-crashtracker", "dep:pyo3-ffi", "dep:libc"]
profiling = ["dep:libdd-profiling-ffi"]
ffe = ["dep:datadog-ffe"]
stats = ["dep:libdd-ddsketch"]
telemetry = ["libdd-data-pipeline/telemetry"]
# health-metrics = ["libdd-data-pipeline/health-metrics"]

[dependencies]
anyhow = { version = "1.0", optional = true }
libc = { version = "0.2", optional = true }
rand = "0.9"
serde = "1.0"
datadog-ffe = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", optional = true, version = "1.0.0", features = ["pyo3"] }
serde_json = "1.0"
datadog-remote-config = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry" }
datadog-tracer-flare = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry" }
libdd-crashtracker = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", optional = true }
libdd-ddsketch = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", optional = true }
libdd-library-config = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry" }
libdd-log = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry" }
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", default-features = false, features = ["https"] }
libdd-profiling-ffi = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", optional = true, features = [ "cbindgen", ] }
libdd-trace-utils = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry" }
pyo3 = { version = "0.27", features = ["extension-module", "anyhow"] }
tracing = { version = "0.1", default-features = false }
pyo3-ffi = { version = "0.27", optional = true }

[build-dependencies]
pyo3-build-config = "0.27"
build_common = { git = "https://github.com/DataDog/libdatadog", branch = "julio/opt-in-telemetry", features = [
    "cbindgen",
] }

[lib]
name = "_native"
path = "lib.rs"
crate-type = ["cdylib"]
