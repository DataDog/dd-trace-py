[package]
name = "ddtrace-native"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.release]
lto = true
debug = "line-tables-only"
opt-level = 's'
codegen-units = 1

[features]
crashtracker = ["dep:anyhow", "dep:libdd-crashtracker"]
profiling = ["dep:libdd-profiling-ffi"]

[dependencies]
anyhow = { version = "1.0", optional = true }
libdd-crashtracker = { git = "https://github.com/DataDog/libdatadog", branch = "main", optional = true }
libdd-ddsketch = { git = "https://github.com/DataDog/libdatadog", branch = "main" }
libdd-library-config = { git = "https://github.com/DataDog/libdatadog", branch = "main" }
libdd-log = { git = "https://github.com/DataDog/libdatadog", branch = "main" }
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", branch = "main" }
libdd-profiling-ffi = { git = "https://github.com/DataDog/libdatadog", branch = "main", optional = true, features = [
    "cbindgen",
] }
libdd-common = { git = "https://github.com/DataDog/libdatadog", branch = "main" }
pyo3 = { version = "0.25", features = ["extension-module", "anyhow"] }
tracing = { version = "0.1", default-features = false }
pyo3-ffi = "0.25"

[build-dependencies]
pyo3-build-config = "0.25"
cc = "1.2.39"
build_common = { git = "https://github.com/DataDog/libdatadog", branch = "main", features = [
    "cbindgen",
] }

[lib]
name = "_native"
path = "lib.rs"
