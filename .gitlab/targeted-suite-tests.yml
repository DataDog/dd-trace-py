stages:
  - generate
  - tests

include:
  - local: ".gitlab/testrunner.yml"

targeted-tests-gen:
  stage: generate
  extends: .testrunner
  needs: []
  variables:
    UNPIN_DEPENDENCIES: "${UNPIN_DEPENDENCIES:-}"
    NIGHTLY_BUILD: "${NIGHTLY_BUILD:-}"
  id_tokens:
    DDOCTOSTS_ID_TOKEN:
      aud: dd-octo-sts
  script:
    - |
      resolved_python_version="${TEST_PYTHON_VERSION:-${PYTHON_VERSION:-}}"
      if [ -z "${TEST_SUITE:-}" ]; then
        echo "TEST_SUITE must be set"
        exit 1
      fi
      echo "TEST_SUITE: ${TEST_SUITE}"
      echo "TEST_VERSION: ${TEST_VERSION:-}"
      echo "TEST_PYTHON_VERSION: ${resolved_python_version:-}"
      echo "TEST_PACKAGE: ${TEST_PACKAGE:-}"
      echo "UNPIN_DEPENDENCIES: ${UNPIN_DEPENDENCIES:-}"
      echo "NIGHTLY_BUILD: ${NIGHTLY_BUILD:-}"
    - |
      if [ -z "${GH_TOKEN:-}" ]; then
        # Use dd-octo-sts to get GitHub token for suite detection helpers.
        export GH_TOKEN=$(dd-octo-sts token --scope DataDog/dd-trace-py --policy gitlab.github-access.read)
      fi
    - |
      resolved_python_version="${TEST_PYTHON_VERSION:-${PYTHON_VERSION:-}}"
      set -- scripts/gen_gitlab_config.py --verbose --suite "${TEST_SUITE}"
      if [ -n "${TEST_VERSION:-}" ]; then
        set -- "$@" --package-version "${TEST_VERSION}"
      fi
      if [ -n "${resolved_python_version:-}" ]; then
        set -- "$@" --python-version "${resolved_python_version}"
      fi
      if [ -n "${TEST_PACKAGE:-}" ]; then
        set -- "$@" --package-name "${TEST_PACKAGE}"
      fi
      "$@"
    - cp .gitlab/tests-gen.yml .gitlab/targeted-tests-gen.yml
  artifacts:
    paths:
      - .gitlab/targeted-tests-gen.yml

targeted-run-tests-trigger:
  stage: tests
  needs: [targeted-tests-gen]
  variables:
    UNPIN_DEPENDENCIES: "${UNPIN_DEPENDENCIES:-}"
    NIGHTLY_BUILD: "${NIGHTLY_BUILD:-}"
  rules:
    - if: $RELEASE_ALLOW_TEST_FAILURES == "true"
      allow_failure: true
    - allow_failure: false
  trigger:
    include:
      - artifact: .gitlab/targeted-tests-gen.yml
        job: targeted-tests-gen
    strategy: depend
