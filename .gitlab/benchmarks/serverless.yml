variables:
  SLS_CI_IMAGE: registry.ddbuild.io/ci/serverless-tools:1

benchmark-serverless:
  stage: benchmarks
  trigger:
    project: DataDog/serverless-tools
    strategy: depend
    ref: 7b51a92c8c9e73c6a5037ef9a365c7576ee4660b
  needs:
    - job: "upload all"
  rules:
    # AIDEV-NOTE: Temporary guard for 4.5 backports while serverless-tools setup fails independently of dd-trace-py changes.
    - if: $CI_COMMIT_BRANCH == "4.5"
      when: never
    - if: $CI_COMMIT_BRANCH =~ /backport-4\.5$/
      when: never
    - if: $RELEASE_ALLOW_BENCHMARK_FAILURES == "true"
      allow_failure: true
    - allow_failure: false
  variables:
    UPSTREAM_PIPELINE_ID: $CI_PIPELINE_ID
    UPSTREAM_PROJECT_URL: $CI_PROJECT_URL
    UPSTREAM_COMMIT_BRANCH: $CI_COMMIT_BRANCH
    UPSTREAM_COMMIT_AUTHOR: $CI_COMMIT_AUTHOR
    UPSTREAM_COMMIT_TITLE: $CI_COMMIT_TITLE
    UPSTREAM_COMMIT_TAG: $CI_COMMIT_TAG
    UPSTREAM_PROJECT_NAME: $CI_PROJECT_NAME
    UPSTREAM_GITLAB_USER_LOGIN: $GITLAB_USER_LOGIN
    UPSTREAM_GITLAB_USER_EMAIL: $GITLAB_USER_EMAIL
