# Multi-OS Test Suite
# Tests the application across Ubuntu, macOS, and Windows with multiple Python versions

.multi_os_test_base:
  stage: tests
  variables:
    DD_IAST_ENABLED: "false"
    DD_REMOTE_CONFIGURATION_ENABLED: "false"

# Tart VMs default to using zsh instead of bash
os tests macos:
  extends: .multi_os_test_base
  image: "486234852809.dkr.ecr.us-east-1.amazonaws.com/ci/ci-platform-machine-images/tart-vm:dd-trace-py-sonoma-latest"
  tags: ["macos:unsafe"]
  needs: [ "build macos arm64" ]
  variables:
    WHEEL_PATTERN: "macosx*arm64.whl"
    PLATFORM: "macOS"
    # Disables collapsable sections in multi-line scripts due to incompatibility with zsh
    FF_SCRIPT_SECTIONS: "false"
    GIT_CLONE_PATH: $CI_BUILDS_DIR/$CI_PROJECT_PATH_SLUG
  hooks:
    pre_get_sources_script:
      - |
        set -euo pipefail
        EXT_DISK=$(diskutil list | awk '/^\/dev\/disk[0-9]+ \(external/ {print $1; exit}')
        if [[ -z "$EXT_DISK" ]]; then
          >&2 echo "WARN: no --disk attached, clone will land on EBS"
          sudo mkdir -p /var/builds-fast
          sudo chown -R admin:staff /var/builds-fast
          exit 0
        fi
        echo "Found external disk: $EXT_DISK"
        sudo diskutil eraseDisk APFS BuildDisk "$EXT_DISK"
        sudo diskutil unmount BuildDisk
        sudo mkdir -p /var/builds-fast
        sudo diskutil mount -mountPoint /var/builds-fast BuildDisk
        sudo chown -R admin:staff /var/builds-fast
        df -h /var/builds-fast
  script:
    - |
      echo "=== Disk layout check ==="
      pwd
      # confirm CWD is on disk1 not disk0
      df -h .
      mount | grep BuildDisk
      stat -f "%Sd" .
