build_base_venvs:
  extends: .cached_testrunner
  stage: setup
  needs: []
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
  variables:
    # Lowered from 12: Abseil + IAST native C++ compilation OOMs CI runners at
    # high parallelism. 4 parallel jobs keeps memory usage manageable while still
    # providing meaningful speedup over serial compilation.
    CMAKE_BUILD_PARALLEL_LEVEL: '4'
    PIP_VERBOSE: '0'
    DD_PROFILING_NATIVE_TESTS: '1'
    DD_USE_SCCACHE: '1'
    DD_PROFILING_MEMALLOC_ASSERT_ON_REENTRY: '1'
    # Disable link time optimization settings to improve build times, the impact will be larger binary sizes
    CARGO_PROFILE_RELEASE_LTO: 'off'
    CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'
    CARGO_PROFILE_RELEASE_OPT_LEVEL: '2'
  script: |
    set -e -o pipefail
    echo "UNPIN_DEPENDENCIES: {unpin_dependencies}"
    echo "NIGHTLY_BUILD: {nightly_build}"
    # Install patched riot if requested (same override as scripts/ddtest uses for
    # test jobs, needed until the testrunner image is rebuilt with the new riot).
    DEFAULT_RIOT_INSTALL_SOURCE="git+https://github.com/DataDog/riot.git@dfdafadac3f22d8ce61472a4c6f4916b891a2638"
    RIOT_INSTALL_SOURCE="${{DD_TEST_RIOT_INSTALL_SOURCE:-$DEFAULT_RIOT_INSTALL_SOURCE}}"
    if [ -n "${{RIOT_INSTALL_SOURCE:-}}" ]; then
      python -m pip uninstall -y riot >/dev/null 2>&1 || true
      python -m pip install --disable-pip-version-check --no-deps "$RIOT_INSTALL_SOURCE"
    fi
    if [[ {unpin_dependencies} == "true" ]]
    then
      python scripts/allow_prerelease_dependencies.py
      export PIP_PRE=true
    fi
    riot -P -v generate --python=$PYTHON_VERSION
    .riot/venv_py3*/bin/pip freeze
    echo "Running smoke tests"
    riot -v run -s --python=$PYTHON_VERSION smoke_test
    # AIDEV-NOTE: Copy meson-built Cython/native extensions from the meson build
    # directory into the ddtrace/ source tree.  With the meson-python editable
    # install, compiled extensions (e.g. _encoding.cpython-39.so) live exclusively
    # in build/mesonpy-*/ and are served to importers via MesonpyMetaFinder in
    # sys.meta_path.  Tests that spawn subprocesses using system Python interpreters
    # (without access to the riot venv's site-packages and therefore without
    # MesonpyMetaFinder) cannot import ddtrace because the extensions are not in the
    # source tree.  Copying them here restores the behavior that cmake/setuptools
    # provided (where extensions lived in ddtrace/ after an in-place build) and
    # allows the existing ddtrace/**/*.so* artifact glob to capture them.
    python - <<'PYEOF'
import importlib.machinery, json, os, pathlib, shutil
ext_suffixes = tuple(importlib.machinery.EXTENSION_SUFFIXES)
copied = 0
for build_dir in pathlib.Path("build").glob("mesonpy-*/"):
    plan_path = build_dir / "meson-info" / "intro-install_plan.json"
    if not plan_path.exists():
        continue
    with open(plan_path, encoding="utf-8") as fh:
        plan = json.load(fh)
    for _section, data in plan.items():
        for src, target_info in data.items():
            dest = target_info.get("destination", "")
            parts = pathlib.PurePosixPath(dest).parts
            if not parts or parts[0] not in ("{{py_platlib}}", "{{py_purelib}}"):
                continue
            if len(parts) < 2 or parts[1] != "ddtrace":
                continue
            if not any(src.endswith(s) for s in ext_suffixes):
                continue
            rel = os.path.join(*parts[1:])  # e.g. ddtrace/internal/_encoding.cpython-39.so
            dst = pathlib.Path(rel)
            dst.parent.mkdir(parents=True, exist_ok=True)
            shutil.copy2(src, dst)
            copied += 1
print("Copied " + str(copied) + " meson extension(s) into source tree.", flush=True)
PYEOF
    # Touch all files in the meson build directory to a far-future timestamp so
    # that ninja considers every output up-to-date in downstream test jobs.
    # Without this, `git checkout` in each test job stamps source files with the
    # current time, which is newer than the build-dir artifacts, causing ninja to
    # trigger a full cmake rebuild (Abseil + IAST native) and OOM the runner.
    find build/mesonpy-*/ -exec touch -d "2099-01-01 00:00:00 UTC" {{}} + 2>/dev/null || true
  artifacts:
    name: venv_$PYTHON_VERSION
    paths:
      - .riot/venv_*
      - ddtrace/_version.py
      - ddtrace/**/*.so*
      - ddtrace/internal/datadog/profiling/test/test_*
      - build/mesonpy-*/
