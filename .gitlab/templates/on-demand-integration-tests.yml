stages:
  - generate
  - test

generate-on-demand-integration-tests:
  stage: generate
  needs: []
  # DDCI loads this configuration from external storage under an identity that
  # cannot resolve private project includes. Keep this bootstrap job
  # self-contained; the generated child pipeline has normal project context.
  image:
    name: registry.ddbuild.io/dd-trace-py:v115521171-bbc5877-testrunner@sha256:a3e99a5fab74078806d5507b9743370ca375e63dd36b0a0eace4d05cfd1ecda3
    docker:
      user: bits
  tags: ["arch:amd64"]
  timeout: 20m
  before_script:
    - ulimit -c unlimited
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
    - pyenv global 3.12 3.9 3.10 3.11 3.13 3.14 3.15-dev
  script:
    - |
      set -euo pipefail
      : "${INTEGRATION:?Set INTEGRATION to a contrib suite name, for example httpx}"
      if [[ ! "${INTEGRATION}" =~ ^[a-zA-Z0-9_.-]+$ ]]; then
        echo "Invalid integration name: ${INTEGRATION}" >&2
        exit 1
      fi

      # AIDEV-NOTE: --suite restricts test generation while --file prevents the
      # remaining generators from querying PR changes in this on-demand pipeline.
      scripts/gen_gitlab_config.py \
        --verbose \
        --suite "contrib::${INTEGRATION}" \
        --file "tests/contrib/${INTEGRATION}/"

      if ! grep -Fq "contrib/${INTEGRATION}:" .gitlab/tests-gen.yml; then
        echo "No contrib integration suite named '${INTEGRATION}' was generated" >&2
        exit 1
      fi
  artifacts:
    paths:
      - .gitlab/tests-gen.yml
    expire_in: 1 day

run-on-demand-integration-tests:
  stage: test
  needs:
    - generate-on-demand-integration-tests
  trigger:
    include:
      - artifact: .gitlab/tests-gen.yml
        job: generate-on-demand-integration-tests
    strategy: depend
