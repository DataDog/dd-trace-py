name: System Tests

on:
  push:
    branches:
      - main
      - mq-working-branch-*
  pull_request: {}
  workflow_dispatch: {}
  schedule:
    - cron: '00 04 * * *'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if relevant paths changed
        id: check
        run: |
          .github/scripts/should-run.sh "${{ github.event_name }}" \
            "${{ github.event.pull_request.base.sha }}"

  download-s3-wheels:
    needs: [should-run]
    if: needs.should-run.outputs.run == 'true' && (github.event_name != 'schedule' || github.event.repository.fork == false)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve commit SHA
        id: resolve-sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download wheels from S3
        run: |
          bash scripts/download-s3-wheels.sh \
            "${{ steps.resolve-sha.outputs.sha }}" \
            ./wheels \
            manylinux2014_x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries
          path: ./wheels/*.whl

  tracer-release:
    needs:
      - download-s3-wheels
    uses: DataDog/system-tests/.github/workflows/system-tests.yml@main
    with:
      library: python
      binaries_artifact: binaries
      desired_execution_time: 900
      scenarios_groups: tracer-release
      skip_empty_scenarios: ${{github.event_name == 'pull_request'}}
      excluded_scenarios: FEATURE_FLAGGING_AND_EXPERIMENTATION  # incident-54756
      push_to_test_optimization: true

