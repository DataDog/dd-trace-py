name: Build

on:
  push:
    branches:
      - main
      - '[0-9].[0-9]*'
      - '[0-9].x'
      # special branches used to test this workflow
      # before merging/releasing
      - build_deploy*
      - 'upgrade-latest-*'
      - 'mq-working-branch-*'
      # TODO: Remove this after 3.x work is done
      - 3.x-staging
  pull_request:
  merge_group:
  release:
    types:
      - published
  workflow_dispatch:
    # Allow manually triggering, but do NOT upload the result
  schedule:
    # Nightly builds after weekdays
    - cron:  0 2 * * 2-6

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if relevant paths changed
        id: check
        run: |
          .github/scripts/should-run.sh "${{ github.event_name }}" \
            "${{ github.event.pull_request.base.sha }}"

  build_wheels:
    if: (github.event_name != 'schedule' || github.event.repository.fork == false) && (needs.should-run.outputs.run == 'true')
    needs: [should-run]
    uses: ./.github/workflows/build_python_3.yml
    with:
      cibw_build: 'cp39* cp310* cp311* cp312* cp313* cp314*'
      cibw_skip: 'cp39-win_arm64 cp310-win_arm64 cp314t* *_i686'
