name: validate-dependabot
on:
  push:
    branches:
      - mq-working-branch-*
  merge_group:
  pull_request:
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/validate-dependabot.yml"
      - "scripts/validate_dependabot_config.py"

jobs:
  validate-dependabot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install validation tooling
        # ci-deps: allow — minimal install of two pinned dependabot-validation
        # tools; not worth adding to ci/requirements/ci.txt since they are only
        # used by this workflow. Same pattern as .gitlab/package.yml:434.
        run: pip install "pyyaml==6.0.2" "check-jsonschema==0.37.3"  # ci-deps: allow
      # Structural validation against the published Dependabot JSON schema.
      - name: Validate against Dependabot schema
        run: check-jsonschema --builtin-schema vendor.dependabot .github/dependabot.yml
      # Semantic rules that the JSON schema does not encode (e.g. semver-*-days
      # cooldown keys are rejected for non-semver ecosystems). This is what
      # GitHub's native validator only surfaces in the merge queue.
      - name: Validate Dependabot cooldown rules
        run: python scripts/validate_dependabot_config.py
