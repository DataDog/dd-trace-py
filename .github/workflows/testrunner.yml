name: Testrunner

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "docker/**"

jobs:
  build-and-publish:
    uses: ./.github/workflows/build-and-publish-image.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      tags: "ghcr.io/datadog/dd-trace-py/testrunner:${{ github.sha }},ghcr.io/datadog/dd-trace-py/testrunner:latest"
      platforms: "linux/amd64,linux/arm64/v8"
      build-args: ""
      context: ./docker
      octo-sts-policy: self.testrunner
