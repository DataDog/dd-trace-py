name: Update riot package lockfiles

on:
  workflow_dispatch:
    inputs:
      integration_name:
        description: "Riot integration/venv name to update"
        required: true
        type: string
      package_name:
        description: "Canonical package name for PR metadata"
        required: true
        type: string

jobs:
  update-riot-package-lockfiles:
    name: Update riot package lockfiles
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python 3.9
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.9"

      - name: Setup Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Setup Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker compose --version

      - name: Start docker service
        run: docker compose up -d testagent

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - uses: ./.github/actions/setup-ci-deps

      - name: Install ddtrace from pre-built wheel
        run: |
          curl https://dd-trace-py-builds.s3.amazonaws.com/main/install.sh | bash

      - name: Compute supply-chain cooldown cutoff
        id: cooldown
        run: |
          # TEST-CD (APMLP-1362): forward a cutoff 48h in the past to riot's
          # uv pip compile backend so transitive deps younger than the
          # cooldown can't be pulled into a regenerated lockfile.
          CUTOFF=$(date -u -d "2 days ago" "+%Y-%m-%dT%H:%M:%SZ" 2>/dev/null \
                   || python -c "import datetime as dt; print((dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=2)).strftime('%Y-%m-%dT%H:%M:%SZ'))")
          echo "cutoff=${CUTOFF}" >> "$GITHUB_OUTPUT"
          echo "Using exclude-newer cutoff: ${CUTOFF}"

      - name: Run regenerate-riot-latest
        env:
          TARGET_PACKAGE: ${{ inputs.integration_name }}
          # Opt riot's `requirements` compile step into `uv pip compile` so
          # that --exclude-newer can be forwarded for the cooldown. Older
          # riot versions ignore both variables silently, so this is safe
          # to set before the riot upgrade lands.
          RIOT_PIP_COMPILE_BACKEND: "uv"
          RIOT_PIP_COMPILE_EXCLUDE_NEWER: ${{ steps.cooldown.outputs.cutoff }}
        run: scripts/regenerate-riot-latest.sh "$TARGET_PACKAGE"

      - name: Run integration registry update
        run: python scripts/integration_registry/update_and_format_registry.py

      - name: Get latest version
        id: new-latest
        env:
          TARGET_PACKAGE: ${{ inputs.package_name }}
        run: |
          NEW_LATEST=$(python scripts/get_latest_version.py "$TARGET_PACKAGE")
          echo "new_latest=$NEW_LATEST" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        if: steps.changes.outputs.changed == 'true'
        id: octo-sts
        with:
          scope: DataDog/dd-trace-py
          policy: self.generate-package-versions.create-pr

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          branch: "upgrade-latest-${{ inputs.package_name }}-version"
          commit-message: "Update package version"
          delete-branch: true
          base: main
          title: "chore: update ${{ inputs.package_name }} latest version to ${{ steps.new-latest.outputs.new_latest }}"
          labels: changelog/no-changelog
          body: |
            Update ${{ inputs.package_name }} lockfiles.
            This updates only the riot lockfiles for the selected package/venv.
