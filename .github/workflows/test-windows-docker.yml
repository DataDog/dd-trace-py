name: Test Windows Docker Build Image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - docker/Dockerfile.windows
      - .github/workflows/test-windows-docker.yml
      - .github/scripts/windows-docker-build.ps1
      - .github/scripts/windows-docker-test.ps1

jobs:
  test-wheel-build:
    runs-on: windows-2022
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        arch: ["amd64", "x86"]
    env:
      IMAGE: ghcr.io/datadog/dd-trace-py/windows-build:latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Start Windows container daemon
        shell: powershell
        run: |
          Start-Service docker
          $timeout = 30
          while (-not (docker info 2>$null)) {
            Start-Sleep -Seconds 1
            $timeout--
            if ($timeout -le 0) { throw "Docker daemon did not start in time" }
          }

      - name: Pull Windows build image
        shell: powershell
        run: docker pull ${{ env.IMAGE }}

      - name: Validate tools in image
        shell: powershell
        run: |
          $pyPlatform = if ('${{ matrix.arch }}' -eq 'x86') { 'windows-x86' } else { 'windows-x86_64' }
          $uvPython = "cpython-${{ matrix.python-version }}-$pyPlatform"

          docker run --rm `
            -e "UV_PYTHON_INSTALL_DIR=C:\tools\uv-python" `
            ${{ env.IMAGE }} `
            powershell -Command "
              `$ErrorActionPreference = 'Stop'
              Write-Host '=== Validating tools ==='
              uv --version
              rustc --version
              cargo --version
              git --version

              Write-Host 'Finding Python: $uvPython'
              `$pyExe = & uv python find '$uvPython'
              if (-not `$pyExe) { throw 'Python not found' }
              & `$pyExe --version

              `$vcvarsall = 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat'
              if (-not (Test-Path `$vcvarsall)) { throw `"vcvarsall.bat not found at `$vcvarsall`" }
              Write-Host `"vcvarsall.bat: `$vcvarsall`"
              Write-Host '=== All tools validated ==='
            "

      - name: Build wheel
        shell: powershell
        run: |
          $pyPlatform = if ('${{ matrix.arch }}' -eq 'x86') { 'windows-x86' } else { 'windows-x86_64' }
          $vcArch = if ('${{ matrix.arch }}' -eq 'x86') { 'x64_x86' } else { 'amd64' }
          $uvPython = "cpython-${{ matrix.python-version }}-$pyPlatform"

          docker run --rm `
            -v "${{ github.workspace }}:C:\workspace" `
            -e "UV_PYTHON=$uvPython" `
            -e "UV_PYTHON_INSTALL_DIR=C:\tools\uv-python" `
            -w C:\workspace `
            ${{ env.IMAGE }} `
            powershell -NoProfile -NonInteractive -File C:\workspace\.github\scripts\windows-docker-build.ps1 -VcArch $vcArch

      - name: Test wheel
        shell: powershell
        run: |
          $pyPlatform = if ('${{ matrix.arch }}' -eq 'x86') { 'windows-x86' } else { 'windows-x86_64' }
          $uvPython = "cpython-${{ matrix.python-version }}-$pyPlatform"

          docker run --rm `
            -v "${{ github.workspace }}:C:\workspace" `
            -e "UV_PYTHON_INSTALL_DIR=C:\tools\uv-python" `
            -w C:\workspace `
            ${{ env.IMAGE }} `
            powershell -NoProfile -NonInteractive -File C:\workspace\.github\scripts\windows-docker-test.ps1 -UvPython $uvPython

      - name: Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: wheel-${{ matrix.python-version }}-${{ matrix.arch }}
          path: dist\*.whl
          retention-days: 7
