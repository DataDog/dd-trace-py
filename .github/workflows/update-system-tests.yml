name: Update system-tests pin

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1-5' # weekdays at 06:00 UTC

permissions:
  id-token: write
  contents: read

jobs:
  update-system-tests-pin:
    name: Update system-tests pin
    if: github.event_name != 'schedule' || github.event.repository.fork == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Run update script
        run: python scripts/update-system-tests-version.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            NEW_SHA=$(git diff .github/workflows/system-tests.yml | grep '^+.*ref:' | grep -oE "[0-9a-f]{40}" | head -1)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        if: steps.changes.outputs.changed == 'true'
        id: octo-sts
        with:
          scope: DataDog/dd-trace-py
          policy: self.update-system-tests.create-pr

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          branch: ci/update-system-tests-pin
          commit-message: "ci: update system-tests pin to ${{ steps.changes.outputs.new_sha }}"
          delete-branch: true
          base: main
          title: "ci: update system-tests pin to ${{ steps.changes.outputs.new_sha }}"
          labels: changelog/no-changelog
          body: |
            Automated bump of the system-tests SHA pin to the latest `main`.

            Run by the [Update system-tests pin](https://github.com/DataDog/dd-trace-py/actions/workflows/update-system-tests.yml) workflow.
