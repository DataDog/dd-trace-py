name: Build Python 3
on:
  workflow_call:
    inputs:
      package-dir:
        required: true
        type: string
      py-version:
        required: true
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build ${{ inputs.py-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        name: Install Python
        with:
          python-version: ${{ inputs.py-version }}
      - name: Build wheels with uv
        run: |
          export UV_PYTHON="python"
          cd ${{ inputs.package-dir }}
          .gitlab/scripts/build-wheel.sh
      - name: Validate wheel RECORD files
        shell: bash
        run: |
          cd ${{ inputs.package-dir }}
          for wheel in ./pywheels/*.whl; do
            if [ -f "$wheel" ]; then
              echo "Validating $(basename $wheel)..."
              python ../scripts/validate_wheel.py "$wheel"
            fi
          done
      - run: |
          echo "ARTIFACT_NAME=${{ inputs.py-version }}" >> $GITHUB_ENV
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ env.ARTIFACT_NAME }}
          path: ./${{ inputs.package-dir }}/pywheels/*.whl
