# Lock Profiler Performance Benchmark Configurations
# Measures overhead of lock profiling at different sampling rates

# Lock creation benchmarks
creation-baseline: &creation_base
  benchmark_type: "creation"
  num_locks: 1000
  capture_pct: 0.0

creation-1pct:
  <<: *creation_base
  capture_pct: 1.0

creation-10pct:
  <<: *creation_base
  capture_pct: 10.0

creation-100pct:
  <<: *creation_base
  capture_pct: 100.0

