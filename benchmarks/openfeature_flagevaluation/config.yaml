defaults: &defaults
  num_flags: 100
  num_context_fields: 8

# Eval hot path the caller pays: finally_after hook (cheap capture + non-blocking enqueue).
hook-enqueue:
  <<: *defaults
  mode: hook_enqueue

# Eval hot path with a small context (typical server eval).
hook-enqueue-small-context:
  <<: *defaults
  mode: hook_enqueue
  num_context_fields: 2

# Eval hot path with a large context (stresses the shallow copy on the hook path).
hook-enqueue-large-context:
  <<: *defaults
  mode: hook_enqueue
  num_context_fields: 64

# Background worker hot path: flatten + deterministic prune + canonical key + two-tier insert.
aggregate:
  <<: *defaults
  mode: aggregate

# Aggregation under high flag cardinality (more distinct full-tier buckets).
aggregate-high-cardinality:
  <<: *defaults
  mode: aggregate
  num_flags: 2500

# End-to-end per-flush shape: N enqueues then a full drain + aggregate.
hook-plus-drain:
  <<: *defaults
  mode: hook_plus_drain
