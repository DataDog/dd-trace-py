shallow: &base
  max_depth: 10
  enable_sleep: false
  sleep_duration: 0.1
  profiler_enabled: false
  gc_frames_enabled: false
  force_cyclic_gc: false

medium: 
  <<: *base
  max_depth: 50

deep:
  <<: *base
  max_depth: 400

deep-profiled:
  <<: *base
  max_depth: 400
  profiler_enabled: true

deep-profiled-gc:
  <<: *base
  max_depth: 400
  profiler_enabled: true
  gc_frames_enabled: true
  force_cyclic_gc: true
