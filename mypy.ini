[mypy]
python_version = 3.9
files = ddtrace,
      docs
exclude = ddtrace/appsec/_iast/_taint_tracking/cmake-build-debug/|ddtrace/appsec/_iast/_taint_tracking/_vendor/|ddtrace/appsec/_iast/_taint_tracking/_deps/|ddtrace/internal/datadog/profiling/build|ddtrace/profiling/collector/test/build/
# mypy thinks .pyx files are scripts and errors out if it finds multiple scripts
scripts_are_modules = true
show_error_codes = true
warn_unused_ignores = true
warn_unused_configs = true
ignore_missing_imports = true
namespace_packages = true
plugins = envier.mypy
# All --strict flags explicitly listed so individual flags can be overridden
# per-module without strict= expansion conflicts.
# https://mypy.readthedocs.io/en/stable/command_line.html#cmdoption-mypy-strict
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
warn_return_any = true
no_implicit_reexport = true
strict_equality = true
extra_checks = true
# Extra strictness beyond --strict
warn_unreachable = true
# warn_redundant_casts cannot be suppressed per-module, so we disable it
# globally to avoid requiring code changes across many files.
warn_redundant_casts = false

# ddtrace.contrib is not yet conformant; errors suppressed until it is cleaned up.
# no_implicit_reexport = false because contrib re-exports integration symbols.

[mypy-ddtrace.contrib.*]
ignore_errors = true
no_implicit_reexport = false

[mypy-ddtrace.contrib.internal.aiohttp.*]
ignore_errors = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
disallow_subclassing_any = false
check_untyped_defs = false

# ddtrace.vendor contains vendored third-party code kept 1:1 with upstream.

[mypy-ddtrace.vendor.*]
ignore_errors = true
no_implicit_reexport = false

# docs/conf.py is treated as module "conf" since docs/ has no __init__.py.

[mypy-conf]
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_subclassing_any = false

# tests/ is transitively checked because ddtrace/profiling/collector/memalloc.py
# imports from tests.profiling.collector.pprof_utils.

[mypy-tests.*]
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_subclassing_any = false
check_untyped_defs = false

