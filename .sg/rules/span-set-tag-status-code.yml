id: span-set-tag-status-code
message: "Use `span._set_attribute($KEY, $VALUE)` instead of `span.set_tag($KEY, $VALUE)` for http.STATUS_CODE"
severity: warning
language: python
rule:
  pattern: $X.set_tag($KEY, $VALUE)
constraints:
  KEY:
    regex: '^(http\.STATUS_CODE|"http\.status_code")$'
fix: $X._set_attribute($KEY, $VALUE)
note: |
  `_set_attribute(http.STATUS_CODE, value)` coerces the value to str() and stores it in
  `_meta` (not `_metrics`), preserving the behavior required by the trace agent.
  Callers may pass int or str values; coercion is handled internally.
  Use `_set_attribute` instead of `set_tag` to avoid the broader `set_tag` overhead
  and to prepare for Rust migration.
