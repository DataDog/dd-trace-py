id: os-environ-fix-unsetenv
message: Use ddtrace.internal.settings.env.unsetenv instead of os.unsetenv
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
rule:
  pattern: os.unsetenv($KEY)
fix: unsetenv($KEY)
note: |
  Replace `os.unsetenv(key)` with `unsetenv(key)` from `ddtrace.internal.settings.env`.
  After applying fix, add the import manually:
    from ddtrace.internal.settings.env import unsetenv
