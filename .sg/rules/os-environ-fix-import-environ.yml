id: os-environ-fix-import-environ
message: Use ddtrace.internal.settings instead of importing environ from os
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
rule:
  pattern: from os import environ
fix: from ddtrace.internal.settings import env
note: |
  Replace `from os import environ` with `from ddtrace.internal.settings import env`.
  You will also need to update all `environ` references in the file to `env`.
