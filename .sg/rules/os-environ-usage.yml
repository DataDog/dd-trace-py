id: os-environ-usage
message: Use ddtrace.internal.settings._env instead of os to access environment variables
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/_env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
  - "ddtrace/testing/**"
rule:
  any:
    # Bare reference to os.environ
    - pattern: os.environ
    # Subscript access: os.environ["KEY"] or os.environ[KEY]
    - pattern: os.environ[$$$ARGS]
    # Method calls on os.environ
    - pattern: os.environ.get($$$ARGS)
    - pattern: os.environ.keys($$$ARGS)
    - pattern: os.environ.values($$$ARGS)
    - pattern: os.environ.items($$$ARGS)
    - pattern: os.environ.copy($$$ARGS)
    - pattern: os.environ.clear($$$ARGS)
    - pattern: os.environ.update($$$ARGS)
    - pattern: os.environ.pop($$$ARGS)
    - pattern: os.environ.setdefault($$$ARGS)
    # os.getenv calls
    - pattern: os.getenv($$$ARGS)
    # Direct imports of environ or getenv from os
    - pattern: from os import environ
    - pattern: from os import environ as $ALIAS
    - pattern: from os import getenv
    - pattern: from os import getenv as $ALIAS
    # Comma-separated imports containing environ
    - pattern: from os import $$$IMPORTS, environ
    - pattern: from os import $$$IMPORTS, environ as $ALIAS
    - pattern: from os import environ, $$$IMPORTS
    - pattern: from os import environ as $ALIAS, $$$IMPORTS
    # Comma-separated imports containing getenv
    - pattern: from os import $$$IMPORTS, getenv
    - pattern: from os import $$$IMPORTS, getenv as $ALIAS
    - pattern: from os import getenv, $$$IMPORTS
    - pattern: from os import getenv as $ALIAS, $$$IMPORTS
note: |
  Direct access to `os.environ` or `os.getenv` is not allowed in `ddtrace/`.
  Use the `ddtrace.internal.settings._env` module instead:

  Before:
    import os
    value = os.environ.get("DD_TRACE_DEBUG", "false")
    value = os.getenv("DD_TRACE_DEBUG", "false")

  After:
    from ddtrace.internal.settings import _env
    value = _env.environ.get("DD_TRACE_DEBUG", "false")
    value = _env.getenv("DD_TRACE_DEBUG", "false")
