id: os-environ-usage
message: Use ddtrace.internal.settings.env instead of os to access environment variables
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
  - "ddtrace/testing/**"
  # --- Pre-existing os.environ usage (to be migrated in follow-up PRs) ---
  - "ddtrace/appsec/**"
  - "ddtrace/commands/**"
  - "ddtrace/contrib/internal/**"
  - "ddtrace/ext/**"
  - "ddtrace/internal/settings/**"
  - "ddtrace/llmobs/**"
  - "ddtrace/profiling/**"
rule:
  any:
    # os.environ matches subscript, method calls, and bare references via subtree matching
    - pattern: os.environ
    # os.getenv, os.putenv, os.unsetenv are separate os attributes, not caught by os.environ
    - pattern: os.getenv($$$ARGS)
    - pattern: os.putenv($$$ARGS)
    - pattern: os.unsetenv($$$ARGS)
    # Direct imports of environ or getenv from os
    - pattern: from os import environ
    - pattern: from os import environ as $ALIAS
    - pattern: from os import getenv
    - pattern: from os import getenv as $ALIAS
    # Comma-separated imports containing environ
    - pattern: from os import $$$IMPORTS, environ
    - pattern: from os import $$$IMPORTS, environ as $ALIAS
    - pattern: from os import environ, $$$IMPORTS
    - pattern: from os import environ as $ALIAS, $$$IMPORTS
    # Comma-separated imports containing getenv
    - pattern: from os import $$$IMPORTS, getenv
    - pattern: from os import $$$IMPORTS, getenv as $ALIAS
    - pattern: from os import getenv, $$$IMPORTS
    - pattern: from os import getenv as $ALIAS, $$$IMPORTS
note: |
  Direct access to `os.environ` or `os.getenv` is not allowed in `ddtrace/`.
  Use the `ddtrace.internal.settings.env` module instead:

  Before:
    import os
    value = os.environ.get("DD_TRACE_DEBUG", "false")
    value = os.getenv("DD_TRACE_DEBUG", "false")

  After:
    from ddtrace.internal.settings import env
    value = env.dd_environ.get("DD_TRACE_DEBUG", "false")
    value = env.getenv("DD_TRACE_DEBUG", "false")
