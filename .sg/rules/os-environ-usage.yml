id: os-environ-usage
message: Use ddtrace.internal.settings.env instead of os to access environment variables
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
  - "ddtrace/testing/**"
  # --- Pre-existing os.environ usage (to be migrated in follow-up PRs) ---
  - "ddtrace/__init__.py"
  - "ddtrace/_monkey.py"
  - "ddtrace/_trace/**"
  - "ddtrace/appsec/**"
  - "ddtrace/bootstrap/**"
  - "ddtrace/commands/**"
  - "ddtrace/contrib/internal/**"
  - "ddtrace/ext/**"
  - "ddtrace/internal/ci_visibility/**"
  - "ddtrace/internal/core/**"
  - "ddtrace/internal/coverage/**"
  - "ddtrace/internal/datadog/**"
  - "ddtrace/internal/datastreams/**"
  - "ddtrace/internal/debug.py"
  - "ddtrace/internal/dist_computing/**"
  - "ddtrace/internal/hostname.py"
  - "ddtrace/internal/logger.py"
  - "ddtrace/internal/native/**"
  - "ddtrace/internal/opentelemetry/**"
  - "ddtrace/internal/processor/**"
  - "ddtrace/internal/remoteconfig/**"
  - "ddtrace/internal/runtime/**"
  - "ddtrace/internal/schema/**"
  - "ddtrace/internal/serverless/**"
  - "ddtrace/internal/settings/**"
  - "ddtrace/internal/telemetry/**"
  - "ddtrace/internal/utils/**"
  - "ddtrace/internal/writer/**"
  - "ddtrace/llmobs/**"
  - "ddtrace/opentelemetry/**"
  - "ddtrace/profiling/**"
  - "ddtrace/sourcecode/**"
rule:
  any:
    # Bare reference to os.environ
    - pattern: os.environ
    # Subscript access: os.environ["KEY"] or os.environ[KEY]
    - pattern: os.environ[$$$ARGS]
    # Method calls on os.environ
    - pattern: os.environ.get($$$ARGS)
    - pattern: os.environ.keys($$$ARGS)
    - pattern: os.environ.values($$$ARGS)
    - pattern: os.environ.items($$$ARGS)
    - pattern: os.environ.copy($$$ARGS)
    - pattern: os.environ.clear($$$ARGS)
    - pattern: os.environ.update($$$ARGS)
    - pattern: os.environ.pop($$$ARGS)
    - pattern: os.environ.setdefault($$$ARGS)
    # os.getenv calls
    - pattern: os.getenv($$$ARGS)
    # os.putenv and os.unsetenv (rarely used, but should also be routed through env module)
    - pattern: os.putenv($$$ARGS)
    - pattern: os.unsetenv($$$ARGS)
    # Direct imports of environ or getenv from os
    - pattern: from os import environ
    - pattern: from os import environ as $ALIAS
    - pattern: from os import getenv
    - pattern: from os import getenv as $ALIAS
    # Comma-separated imports containing environ
    - pattern: from os import $$$IMPORTS, environ
    - pattern: from os import $$$IMPORTS, environ as $ALIAS
    - pattern: from os import environ, $$$IMPORTS
    - pattern: from os import environ as $ALIAS, $$$IMPORTS
    # Comma-separated imports containing getenv
    - pattern: from os import $$$IMPORTS, getenv
    - pattern: from os import $$$IMPORTS, getenv as $ALIAS
    - pattern: from os import getenv, $$$IMPORTS
    - pattern: from os import getenv as $ALIAS, $$$IMPORTS
note: |
  Direct access to `os.environ` or `os.getenv` is not allowed in `ddtrace/`.
  Use the `ddtrace.internal.settings.env` module instead:

  Before:
    import os
    value = os.environ.get("DD_TRACE_DEBUG", "false")
    value = os.getenv("DD_TRACE_DEBUG", "false")

  After:
    from ddtrace.internal.settings import env
    value = env.dd_environ.get("DD_TRACE_DEBUG", "false")
    value = env.getenv("DD_TRACE_DEBUG", "false")
