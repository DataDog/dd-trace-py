id: os-environ-fix-access
message: Use ddtrace.internal.settings.env instead of os.environ
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
  - "ddtrace/testing/**"
  # --- Pre-existing os.environ usage (to be migrated in follow-up PRs) ---
  - "ddtrace/__init__.py"
  - "ddtrace/_monkey.py"
  - "ddtrace/_trace/**"
  - "ddtrace/appsec/**"
  - "ddtrace/bootstrap/**"
  - "ddtrace/commands/**"
  - "ddtrace/contrib/internal/**"
  - "ddtrace/ext/**"
  - "ddtrace/internal/ci_visibility/**"
  - "ddtrace/internal/core/**"
  - "ddtrace/internal/coverage/**"
  - "ddtrace/internal/datadog/**"
  - "ddtrace/internal/datastreams/**"
  - "ddtrace/internal/debug.py"
  - "ddtrace/internal/dist_computing/**"
  - "ddtrace/internal/hostname.py"
  - "ddtrace/internal/logger.py"
  - "ddtrace/internal/native/**"
  - "ddtrace/internal/opentelemetry/**"
  - "ddtrace/internal/processor/**"
  - "ddtrace/internal/remoteconfig/**"
  - "ddtrace/internal/runtime/**"
  - "ddtrace/internal/schema/**"
  - "ddtrace/internal/serverless/**"
  - "ddtrace/internal/settings/**"
  - "ddtrace/internal/telemetry/**"
  - "ddtrace/internal/utils/**"
  - "ddtrace/internal/writer/**"
  - "ddtrace/llmobs/**"
  - "ddtrace/opentelemetry/**"
  - "ddtrace/profiling/**"
  - "ddtrace/sourcecode/**"
rule:
  pattern: os.environ
fix: env
note: |
  Replace `os.environ` with `env` from `ddtrace.internal.settings.env`.
  `env` is a MutableMapping drop-in for os.environ (supports reads, writes, deletes).
  After applying fix, add the import manually:
    from ddtrace.internal.settings.env import dd_environ as env
