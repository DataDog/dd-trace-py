id: os-environ-fix-access
message: Use ddtrace.internal.settings.env instead of os.environ
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
rule:
  pattern: os.environ
fix: env
note: |
  Replace `os.environ` with `env` from `ddtrace.internal.settings`.
  After applying fix, add the import manually:
    from ddtrace.internal.settings import env
