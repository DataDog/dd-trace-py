id: os-environ-fix-import-getenv
message: Use ddtrace.internal.settings instead of importing getenv from os
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
rule:
  pattern: from os import getenv
fix: from ddtrace.internal.settings import env
note: |
  Replace `from os import getenv` with `from ddtrace.internal.settings import env`.
  Then replace `getenv(...)` calls with `env.get(...)`.
