id: os-environ-fix-putenv
message: Use ddtrace.internal.settings.env.setenv instead of os.putenv
severity: error
language: python
files:
  - "ddtrace/**"
ignores:
  - "ddtrace/internal/settings/env.py"
  - "ddtrace/appsec/_iast/_taint_tracking/_vendor/**"
  - "ddtrace/vendor/**"
rule:
  pattern: os.putenv($KEY, $VALUE)
fix: setenv($KEY, $VALUE)
note: |
  Replace `os.putenv(key, value)` with `setenv(key, value)` from `ddtrace.internal.settings.env`.
  After applying fix, add the import manually:
    from ddtrace.internal.settings.env import setenv
