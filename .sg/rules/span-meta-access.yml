id: span-meta-access
message: |
  Do not access `_meta` directly. Use the Span attribute API instead:
    - Write: `span._set_attribute(key, value)`
    - Read key: `span._get_str_attribute(key)`
    - Check key: `span._has_attribute(key)`
    - Read all: `span._get_str_attributes()`
severity: error
language: python
ignores:
  - "ddtrace/_trace/context.py"
  - "ddtrace/appsec/ai_guard/_api_client.py"
rule:
  pattern: $X._meta
constraints:
  X:
    not:
      regex: "context|ctx|Context"
