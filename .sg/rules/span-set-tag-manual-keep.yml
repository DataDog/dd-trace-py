id: span-set-tag-manual-keep
message: "Use `span._override_sampling_decision(USER_KEEP)` instead of `set_tag(MANUAL_KEEP_KEY)`"
severity: warning
language: python
rule:
  any:
    - pattern: $X.set_tag(MANUAL_KEEP_KEY)
    - pattern: $X.set_tag(MANUAL_KEEP_KEY, $VALUE)
note: |
  `set_tag(MANUAL_KEEP_KEY)` is a special case that calls `_override_sampling_decision(USER_KEEP)`.
  The value argument (if any) is ignored by `set_tag`.
  Use `span._override_sampling_decision(USER_KEEP)` directly to make this side-effect explicit.
  Remember to import USER_KEEP from ddtrace.constants.
