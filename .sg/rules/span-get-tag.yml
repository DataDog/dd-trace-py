id: span-get-tag
language: Python
severity: error
message: >
  Use span._get_str_attribute(key) instead of span.get_tag(key).
note: >
  get_tag() is a thin wrapper around _get_str_attribute(). Internal code should
  call _get_str_attribute(key) directly to avoid the indirection.
rule:
  pattern: $X.get_tag($KEY)
ignores:
  - tests/tracer/test_span_public_api.py
