id: os-environ-usage
valid:
  # These should NOT trigger the rule (valid code)
  - from ddtrace.internal.settings.env import setenv; setenv("HOME", "/path")
  - from ddtrace.internal.settings.env import setenv; getenv("HOME")
  - import sys; sys.path

invalid:
  # These should trigger the rule (errors)
  - os.environ["HOME"]
  - os.environ.get("DEBUG", "false")
  - os.getenv("DEBUG")
  - from os import environ
  - from os import getenv
  - value = os.environ.get("KEY", "default")
  - os.putenv("KEY", "value")
  - os.unsetenv("KEY")
