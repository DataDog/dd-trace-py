id: core-raising-dispatch
valid:
  # These should NOT trigger the rule (valid code)
  - core.dispatch("my.event", (arg1, arg2))
  - |
    from ddtrace.internal.core import dispatch
    dispatch("my.event", (arg1,))
  - |
    # Using try/except for flow control is OK
    try:
        core.dispatch("my.event", (args,))
    except MyException:
        pass
  - |
    # Other functions with similar names are OK
    my_module.raising_dispatch(args)
    raising_dispatch_other(args)

invalid:
  # These should trigger the rule (warnings)
  # Direct function calls
  - core.raising_dispatch("my.event", (arg1, arg2))
  - raising_dispatch("my.event", (arg1,))
  - event_hub.raising_dispatch("my.event", ())
  - |
    core.raising_dispatch("my.event", (arg1, arg2))
  - |
    # Using raising_dispatch in a flow
    core.raising_dispatch("my.event", (x,))
    print("done")
  # Import statements
  - from ddtrace.internal.core import raising_dispatch
  - from ddtrace.internal.core import raising_dispatch as rd
  - from ddtrace.internal.core import dispatch, raising_dispatch
  - from ddtrace.internal.core import raising_dispatch, on
  - from ddtrace.internal.core import dispatch, raising_dispatch, on
  - from ddtrace.internal.core.event_hub import raising_dispatch
  - from ddtrace.internal.core.event_hub import raising_dispatch as rd
  - from ddtrace.internal.core.event_hub import dispatch, raising_dispatch
  - |
    from ddtrace.internal.core import raising_dispatch
    raising_dispatch("my.event", (arg1,))
  - |
    from ddtrace.internal.core.event_hub import raising_dispatch
    raising_dispatch("my.event", ())
  - |
    from ddtrace.internal import core
    core.raising_dispatch("my.event", (arg1, arg2))
