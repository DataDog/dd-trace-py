    #[pyclass]
    pub struct GoodOne {
        attrs: Py<PyDict>,
    }

    #[pymethods]
    impl GoodOne {
        fn __traverse__(&self, visit: pyo3::PyVisit<'_>)
            -> Result<(), pyo3::PyTraverseError>
        {
            visit.call(&self.attrs)?;
            Ok(())
        }
    }

