id: span-set-tag-status-code
valid:
  # _set_attribute is the correct pattern
  - span._set_attribute(http.STATUS_CODE, 200)
  - span._set_attribute("http.status_code", status_code)
  # set_tag with other keys is fine
  - span.set_tag("some.other.key", "value")
  - span.set_tag(SOME_OTHER_KEY, value)
invalid:
  # constant form
  - span.set_tag(http.STATUS_CODE, 200)
  - span.set_tag(http.STATUS_CODE, getattr(e, "status_code", 500))
  - span.set_tag(http.STATUS_CODE, status)
  # string literal form
  - span.set_tag("http.status_code", status_code)
  - |
    s = tracer.trace("op")
    s.set_tag(http.STATUS_CODE, 200)
