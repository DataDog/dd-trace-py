.PYTHON_TAGS: &PYTHON_TAGS
  - "cp314-cp314"
.X86_64_IMAGES: &X86_64_IMAGES
  - "v85383392-751efc0-manylinux2014_x86_64"
"ddtrace-internal build sdist":
  extends: .build_base
  needs: []
  stage: "ddtrace-internal:package"
  image: "${IMAGE_BASE_URL}:${IMAGE_TAG}"
  tags: ["arch:${ARCH_TAG}"]
  variables:
    DD_CYTHONIZE: "0"
    ARCH_TAG: "amd64"
    PYTHON_TAG: "cp314-cp314"
    UV_PYTHON: "/opt/python/cp314-cp314/bin/python"
    IMAGE_TAG: "${MANYLINUX_AMD64_IMAGE_TAG}"
    # S3-backed sccache
    SCCACHE_BUCKET: "ddtrace-internal-py-builds"
    SCCACHE_S3_KEY_PREFIX: "sccache"
    SCCACHE_REGION: "us-east-1"
  script:
    - cd ddtrace-internal
    - .gitlab/scripts/build-sdist.sh
  artifacts:
    paths:
      - "pywheels/*.tar.gz"
      - "pywheels/*.whl"
  cache:
    - key: v1-ddtrace-internal-download-cache-${CURRENT_YEAR}-${CURRENT_BIWEEK}
      paths:
        - .download_cache
"ddtrace-internal build linux":
  extends: .build_base
  needs: []
  stage: "ddtrace-internal:package"
  image: ${IMAGE_BASE_URL}:${IMAGE_TAG}
  tags: ["arch:$ARCH_TAG"]
  variables:
    # S3-backed sccache for Linux builds
    SCCACHE_BUCKET: "ddtrace-internal-py-builds"
    SCCACHE_S3_KEY_PREFIX: "sccache"
    SCCACHE_REGION: "us-east-1"
  parallel:
    matrix:
      - ARCH_TAG: "amd64"
        PYTHON_TAG: *PYTHON_TAGS
        IMAGE_TAG: *X86_64_IMAGES
  script:
    - cd ddtrace-internal
    - manylinux-interpreters ensure "${PYTHON_TAG}"
    - |
      if [[ "${UNPIN_DEPENDENCIES:-"false"}" == "true" ]]; then
        manylinux-interpreters ensure "cp314-cp314"  # NB unpinning script requires Py>=311
      fi
    - export UV_PYTHON="/opt/python/${PYTHON_TAG}/bin/python"
    - .gitlab/scripts/build-wheel.sh
"ddtrace-internal build macos":
  extends: .build_base
  needs: []
  stage: "ddtrace-internal:package"
  tags: [ "macos:sonoma-$ARCH_TAG", "specific:true" ]
  parallel:
    matrix:
      # amd64 runners are slower
      - ARCH_TAG: "amd64"
        PYTHON_VERSIONS:
          - "3.14"
  variables:
    SYSTEM_VERSION_COMPAT: "0"
    DD_USE_SCCACHE: "1"
  script: |
    cd ddtrace-internal
    set -euo pipefail
    if ! command -v sccache &> /dev/null; then
      brew install sccache
    fi
    for python_version in ${PYTHON_VERSIONS}; do
      echo -e "\e[0Ksection_start:`date +%s`:build_macos_${python_version}\r\e[0KBuilding macOS wheel for Python ${python_version}"

      export UV_PYTHON="${python_version}"
      .gitlab/scripts/build-wheel.sh

      echo -e "\e[0Ksection_end:`date +%s`:build_macos_${python_version}\r\e[0K"
    done
    sccache --show-stats
"ddtrace-internal build windows":
  needs: []
  stage: "ddtrace-internal:package"
  tags: ["windows-v2:2022"]
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.14"]
        WINDOWS_ARCH: ["amd64"]
  variables:
    WINDOWS_BUILD_IMAGE: "registry.ddbuild.io/images/mirror/dd-trace-py/windows-build:d4d18a67d43d400d3ecc6bda777a5e233a24f434@sha256:58c3e28646ddf8a1021a079a380c8840e51f0b88c1489a522beee6ec99413019"
  script:
    - bash ddtrace-internal/.gitlab/scripts/build-wheel-windows.sh
  artifacts:
    paths:
      - "pywheels/*.whl"
      - "debugwheelhouse/*.log"
