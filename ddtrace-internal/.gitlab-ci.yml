variables:
  IMAGE_BASE_URL: "registry.ddbuild.io/dd-trace-py"
  MANYLINUX_AMD64_IMAGE_TAG: "v113741238-d2b8243-manylinux2014_x86_64"
  ALPINE_BUILD_IMAGE_TAG: "v103339769-be1888c-alpine_build"
.PYTHON_TAGS: &PYTHON_TAGS
  - "cp314-cp314"
.X86_64_IMAGES: &X86_64_IMAGES
  - "v113741238-d2b8243-manylinux2014_x86_64"
include:
  - local: ddtrace-internal/.gitlab/release.yml
.build_base:
  stage: "ddtrace-internal:package"
  needs:
    - job: "ddtrace-internal build linux"
      artifacts: true
  variables:
    CMAKE_BUILD_PARALLEL_LEVEL: "12"
    CARGO_BUILD_JOBS: "12"
    CMAKE_ARGS: "-DNATIVE_TESTING=OFF"
    # DEV: Hack to make ASM CMake able to find the Python3 library
    CIBW_BUILD: "1"
    # Enable sccache for Rust/C/C++ compilation caching
    DD_USE_SCCACHE: "1"
    # job resource requests
    KUBERNETES_CPU_REQUEST: "6"
    KUBERNETES_MEMORY_REQUEST: "10Gi"
    KUBERNETES_MEMORY_LIMIT: "10Gi"
    DD_DISABLE_VPA: true
  artifacts:
    when: always
    paths:
      - "pywheels/*.whl"
      - "pywheels/*.tar.gz"
      - "debugwheelhouse/*.log"
      - "debugwheelhouse/*.zip"
  cache:
    - key: v1-download-cache-${CURRENT_YEAR}-${CURRENT_BIWEEK}
      paths:
        - .download_cache
"build sdist":
  extends: .build_base
  needs: []
  stage: "ddtrace-internal:package"
  image: "${IMAGE_BASE_URL}:${IMAGE_TAG}"
  tags: ["arch:${ARCH_TAG}"]
  variables:
    DD_CYTHONIZE: "0"
    ARCH_TAG: "amd64"
    PYTHON_TAG: "cp314-cp314"
    UV_PYTHON: "/opt/python/cp314-cp314/bin/python"
    IMAGE_TAG: "${MANYLINUX_AMD64_IMAGE_TAG}"
    # S3-backed sccache
    SCCACHE_BUCKET: "ddtrace-internal-py-builds"
    SCCACHE_S3_KEY_PREFIX: "sccache"
    SCCACHE_REGION: "us-east-1"
  script:
    - cd ddtrace-internal
    - .gitlab/scripts/build-sdist.sh
  artifacts:
    paths:
      - "pywheels/"
  cache:
    - key: v1-ddtrace-internal-download-cache-${CURRENT_YEAR}-${CURRENT_BIWEEK}
      paths:
        - .download_cache
"build linux":
  extends: .build_base
  needs: []
  stage: "ddtrace-internal:package"
  image: ${IMAGE_BASE_URL}:${IMAGE_TAG}
  tags: ["arch:$ARCH_TAG"]
  variables:
    # S3-backed sccache for Linux builds
    SCCACHE_BUCKET: "ddtrace-internal-py-builds"
    SCCACHE_S3_KEY_PREFIX: "sccache"
    SCCACHE_REGION: "us-east-1"
  parallel:
    matrix:
      - ARCH_TAG: "amd64"
        PYTHON_TAG: *PYTHON_TAGS
        IMAGE_TAG: *X86_64_IMAGES
  script:
    - cd ddtrace-internal
    - manylinux-interpreters ensure "${PYTHON_TAG}"
    - |
      if [[ "${UNPIN_DEPENDENCIES:-"false"}" == "true" ]]; then
        manylinux-interpreters ensure "cp314-cp314"  # NB unpinning script requires Py>=311
      fi
    - export UV_PYTHON="/opt/python/${PYTHON_TAG}/bin/python"
    - .gitlab/scripts/build-wheel.sh
# Extract package version from pyproject.toml and save to dotenv artifact
"package version":
  image: registry.ddbuild.io/images/mirror/python:3.14.0
  tags: ["arch:amd64"]
  stage: "ddtrace-internal:package"
  script:
    # Prevent git operation errors when the GitLab executor sees the checkout as owned by another user.
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
    - BASE_PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('ddtrace-internal/pyproject.toml', 'rb'))['project']['version'])")
    - PACKAGE_VERSION="${BASE_PACKAGE_VERSION}"
    - |
      if [[ -z "${CI_COMMIT_TAG:-}" && "${BASE_PACKAGE_VERSION}" != *+* ]]; then
        PACKAGE_VERSION="${BASE_PACKAGE_VERSION}+g$(git rev-parse --short=7 HEAD)"
      fi
    - echo "PACKAGE_VERSION=${PACKAGE_VERSION}" | tee -a package_version.env
    - echo "BASE_PACKAGE_VERSION=${BASE_PACKAGE_VERSION}" | tee -a package_version.env
    # Validate commit tag matches base version if tag is set
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        EXPECTED_TAG="v${BASE_PACKAGE_VERSION}"
        if [ "${CI_COMMIT_TAG}" != "${EXPECTED_TAG}" ]; then
          echo "[ERROR] CI_COMMIT_TAG (${CI_COMMIT_TAG}) does not match expected tag (${EXPECTED_TAG})"
          exit 1
        fi
      fi
  artifacts:
    reports:
      dotenv: package_version.env
.package_base:
  image: registry.ddbuild.io/images/mirror/python:3.14.0
  tags: ["arch:amd64"]
  stage: "ddtrace-internal:package"
  before_script:
    - pip install 'packaging>=24.0,<26' # ci-deps: allow
  artifacts:
    when: always
    paths:
      - "pywheels/*.whl"
      - "pywheels/*.tar.gz"
"validate package":
  extends: .package_base
  needs:
    - "build linux"
    - "build sdist"
    - "package version"
  script:
    - ddtrace-internal/.gitlab/validate-ddtraceinternal-package.py pywheels
