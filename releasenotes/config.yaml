---
default_branch: origin/main
unreleased_version_title: Unreleased
sections:
  # The prelude section is implicitly included.
  - [upgrade, Upgrade Notes]
  - [deprecations, Deprecation Notes]
  - [features, New Features]
  - [issues, Known Issues]
  - [api, API Changes]
  - [security, Security Issues]
  - [fixes, Bug Fixes]
  - [other, Other Changes]

# The default is: (?P<pre_release>\.v?\d+(?:[ab]|rc)+\d*)$
# DEV: We have done this to fix how reno collapses pre-releases
#      into the canonical version.
#
#      We have moved the `\.v?\d+` to outside the named "pre_release"
#      matching group because otherwise reno will try to strip
#      ".0rc3" from the release note to match the canonical version
#      when instead it should be "rc3".
pre_release_tag_re: \.v?\d+(?P<pre_release>(?:[ab]|rc)+\d*)$
template: |
  ---
  #instructions:
  #    Written for a customer upgrading dd-trace-py, not a contributor. Not a PR summary.
  #    No internal function/class names, internal tag prefixes (_dd.*), RFC/JIRA/ticket
  #    numbers, CI job names, draft leftovers (TODO, unfinished sentences), or "why we built
  #    it this way" rationale — that goes in the PR description. State the customer-visible
  #    effect. Verify facts (defaults, numbers) against the code, not the PR title.
  #
  #    1-2 sentences per note. Longer only to show a code example for a new public API.
  #    Full sentences, plain language, sentence-case, punctuation. Define Datadog-specific
  #    terms before using them. Use static links (specific version/commit), not
  #    stable/latest/1.x. See docs/releasenotes.rst for the full guide and examples.
  #
  #    Remove all sections you don't use, including this instruction block, before committing.
  prelude: >
      Context for a major change spanning multiple notes. Format: <scope>: <context>.
  features:
    - |
      New feature/integration. If configurable, state the exact env var/config/argument and
      default. Format: <scope>: This introduces <feature>. Set <VAR> to <value> to <effect>.
  issues:
    - |
      Known issue. Format: <scope>: There is a known issue where <symptom> when <condition>.
      <workaround, if any>.
  upgrade:
    - |
      Enhancement, dependency upgrade, or migration step.
      Format: <scope>: This upgrades <what>. To <goal>, <migration_step>.
    - |
      Removal. Format: <scope>: <affected_code> is removed. Use <alternative> instead.
  deprecations:
    - |
      Format: <scope>: <affected_code> is deprecated and will be removed in <version>.
      Use <alternative> instead.
  fixes:
    - |
      State the customer-visible symptom, not the internal root cause, in present tense.
      Format: <scope>: Fixes an issue where <symptom> occurs when <condition>.
  other:
    - |
      Anything else. Format: <scope>: <note>.
