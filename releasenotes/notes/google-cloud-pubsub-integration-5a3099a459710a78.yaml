---
features:
  - |
    google_cloud_pubsub: Add tracing support for the ``google-cloud-pubsub`` library.
    Instruments ``PublisherClient.publish()`` and ``SubscriberClient.subscribe()`` to generate spans
    for message publishing and consuming, with optional distributed trace context propagation via message attributes.
    Use ``DD_GOOGLE_CLOUD_PUBSUB_PROPAGATION_ENABLED`` to control context propagation and
    ``DD_GOOGLE_CLOUD_PUBSUB_REPARENT_ENABLED`` to control whether subscriber spans are reparented
    under the producer trace. Both default to ``True``.
