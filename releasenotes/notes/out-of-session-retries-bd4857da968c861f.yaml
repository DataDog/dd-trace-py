---
features:
  - |
    pytest: Introduce out-of-session retries for Test Optimization. After the test run loop finishes
    and all fixtures (including session-scoped ones) have been torn down, a randomly chosen subset of
    up to 5 of the tests that exhausted Auto Test Retries (failed every in-session ATR attempt) is
    re-run once each, in isolation, so pytest re-creates and tears down their full fixture chain. This
    gives a clean-slate retry for tests that leak state and therefore fail every in-session retry. Each
    re-run is reported as an additional attempt tagged ``test.retry_reason=out_of_session``. Because it
    targets ATR-exhausted failures, it only runs when Auto Test Retries is enabled, and it excludes
    quarantined, disabled, attempt-to-fix, and Early Flake Detection tests. The feature is opt-in and
    disabled by default; enable it by setting ``_DD_CIVISIBILITY_OSR_ENABLED=1``. It does not change
    pytest's pass/fail verdict.
