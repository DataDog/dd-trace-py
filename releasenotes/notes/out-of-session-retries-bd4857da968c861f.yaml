---
features:
  - |
    pytest: Introduce out-of-session retries for Test Optimization. After a test session finishes
    and all fixtures (including session-scoped ones) have been torn down, a randomly chosen subset
    of up to 5 of the tests that exhausted Auto Test Retries (failed every in-session ATR attempt)
    is re-run once each in a fresh session within the same pytest process. This gives a clean-slate
    retry for tests that leak state and therefore fail every in-session retry. Because it targets
    ATR-exhausted failures, it only runs when Auto Test Retries is enabled, and it excludes
    quarantined, disabled, attempt-to-fix, and Early Flake Detection tests. The feature is enabled
    by default and does not change pytest's pass/fail verdict; it can be disabled by setting
    ``DD_CIVISIBILITY_OUT_OF_SESSION_RETRIES_ENABLED=false``.
