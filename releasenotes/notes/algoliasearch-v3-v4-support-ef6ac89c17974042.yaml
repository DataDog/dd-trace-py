---
features:
  - |
    algoliasearch: Adds tracing support for the modern ``algoliasearch`` 3.x and 4.x
    Python clients. ``SearchClientSync.search_single_index``, ``SearchClientSync.search``,
    and their async equivalents on ``SearchClient`` are now wrapped and emit the same
    ``algoliasearch.search`` spans (with ``processing_time_ms`` and ``number_of_hits``
    metrics) that the 2.x integration produces. Previously the integration silently
    no-oped on ``algoliasearch >= 3.0``.
