---
fixes:
  - |
    openai_agents: Adds compatibility with ``openai-agents`` versions where the per-turn function moved from ``AgentRunner._run_single_turn`` (instance method) to module-level free functions in ``agents.run_internal.run_loop`` (``run_single_turn`` / ``run_single_turn_streamed``). This move landed in ``openai-agents`` 0.8.0; without this fix the agent-side context capture and agent-manifest tagging silently no-op on every ``openai-agents`` release from 0.8.0 onward, since the previously-wrapped instance method no longer exists. The integration now detects the module-level shape and wraps the call-site re-export in ``agents.run`` (rather than the definition module, which is reached too late after ``agents/run.py`` imports the symbol at module load). Agent resolution handles every shipped call shape: the ``agent=`` keyword (0.8.0-0.13.x), the ``bindings=`` keyword resolving ``bindings.execution_agent`` (>= 0.14.0), and the streamed variant, which passes the agent/bindings positionally after the streamed-result object.
  - |
    openai_agents: Fixes ``assistant_chars=0`` regression on Responses API runs. ``split_message_chars`` now buckets non-role input items (``function_call``, ``function_call_output``, ``tool_call``, ``reasoning``, and related types) into ``assistant_chars`` by ``type``. Previously these items had no ``role`` field and were silently dropped, causing the ``assistant_messages`` category in the emitted ``context_delta`` to read zero on every multi-turn tool-using run.
