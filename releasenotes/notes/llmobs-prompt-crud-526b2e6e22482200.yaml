---
features:
  - |
    LLM Observability: Adds prompt management methods to ``LLMObs`` for creating, updating, deleting, and listing
    prompts and prompt versions in the prompt registry. Includes typed responses (``PromptResponse``,
    ``PromptVersionResponse``) and a structured exception hierarchy (``PromptAuthError``, ``PromptNotFoundError``,
    ``PromptConflictError``, ``PromptValidationError``, ``PromptServerError``).
