---
features:
  - |
    tracing: This introduces client-side computation of trace metrics and their export in
    OpenTelemetry Protocol (OTLP) format. When enabled, span stats are aggregated into a
    ``dd.trace.span.duration`` histogram and exported to the configured OTLP metrics endpoint,
    reusing the existing ``OTEL_EXPORTER_OTLP_METRICS_*`` settings. Stats computation, OTLP
    encoding, and export are performed natively; the tracer only supplies the configured
    endpoint and headers. Set ``DD_TRACE_OTEL_STATS_COMPUTATION_ENABLED=true`` to enable it;
    when unset, it is enabled automatically if both OTLP trace export and OpenTelemetry metrics
    export are enabled.
