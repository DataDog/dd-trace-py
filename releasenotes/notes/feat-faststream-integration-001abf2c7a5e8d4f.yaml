---
features:
  - |
    faststream: Adds automatic instrumentation for the
    `FastStream <https://github.com/ag2ai/faststream>`_ message-broker
    framework. Consumer and producer operations are traced across all
    FastStream brokers (Kafka, Confluent, RabbitMQ, NATS, Redis, MQTT) by
    registering a Datadog middleware on every broker instance. Distributed
    tracing through message headers is enabled by default and can be disabled
    via the ``DD_FASTSTREAM_DISTRIBUTED_TRACING`` environment variable.
