---
fixes:
  - |
    CI Visibility: This fix resolves a ``ValueError: tool 1 is already in use`` crash that
    occurred when an in-process pytest sub-session using pytest-cov was spawned (e.g. via
    ``pytester.inline_run(--cov)``) inside a ``--ddtrace`` session. ddtrace's line-level
    coverage instrumentation and coverage.py's ``sys.monitoring``-based backend (``SysMonitor``,
    available since coverage.py 7.4.0 and the default on Python 3.14+ since coverage.py 7.9.1)
    both claim ``sys.monitoring.COVERAGE_ID`` (tool slot 1). The fix releases the slot at the
    start of each new in-process session when pytest-cov is active, allowing coverage.py to
    claim it; ddtrace re-registers lazily on the next module import if needed.
