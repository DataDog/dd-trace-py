---
features:
  - |
    aws_durable_execution_sdk_python: Add ``aws.durable.operation_attempt`` tag to
    ``aws.durable.step`` and ``aws.durable.wait_for_condition`` spans. The tag is ``1`` for the
    original attempt and ``2``, ``3``, etc. for each subsequent retry, matching the AWS UI
    attempt-count convention.
