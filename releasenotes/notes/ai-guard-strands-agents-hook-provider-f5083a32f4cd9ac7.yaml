---
features:
  - |
    ASM: This introduces AI Guard support for the AWS Strands Agents SDK.
    Two entry points are provided for evaluating prompts, model responses, and tool calls
    against Datadog AI Guard security policies at four agent lifecycle points
    (``BeforeModelCallEvent``, ``AfterModelCallEvent``, ``BeforeToolCallEvent``, ``AfterToolCallEvent``).

    **Plugin API (recommended, requires strands-agents >= 1.29.0)**::

        from strands import Agent
        from ddtrace.appsec.ai_guard import AIGuardStrandsPlugin

        agent = Agent(model=model, plugins=[AIGuardStrandsPlugin()])

    **HookProvider API (legacy)**::

        from strands import Agent
        from ddtrace.appsec.ai_guard import AIGuardStrandsHookProvider

        agent = Agent(model=model, hooks=[AIGuardStrandsHookProvider()])

    The ``strands-agents`` package is optional. When it is not installed,
    both classes are replaced by no-op stubs that log a warning.
    The Plugin API requires ``strands-agents>=1.29.0``; the HookProvider
    works with any version that exposes the hooks system.
