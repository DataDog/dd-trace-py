---
fixes:
  - |
    LLM Observability: Fixes an issue where SDK-side LLMObs spans (e.g. ``LLMObs.workflow()``) and
    OTel-bridged spans (e.g. from Strands Agents with ``DD_TRACE_OTEL_ENABLED=1``) produced separate
    LLMObs traces instead of a single unified trace. The SDK now writes ``llmobs_trace_id`` and
    ``llmobs_parent_id`` to the APM root span metadata, allowing the backend processor to connect
    both data paths into one trace.
