---
upgrade:
  - |
    ``Span.get_metric()`` and ``Span.get_metrics()`` now always return
    ``float``. Callers using identity comparisons (``is``) against integer
    constants should switch to ``==`` or cast explicitly with ``int()``. The
    return type annotation will be updated to ``float`` in a future 5.0.0
    release.
  - |
    ``Span.set_tag()`` and ``Span.set_tags()`` with ``bool`` values now store
    them as numeric metrics (``1.0`` / ``0.0``) instead of the string
    ``"True"`` / ``"False"``. ``bytes`` values are now UTF-8 decoded instead
    of stored as their ``repr()``. The typed signature accepts ``str`` values
    only; any existing callers passing non-``str`` values should convert to
    ``str`` explicitly to avoid unexpected behavior.
