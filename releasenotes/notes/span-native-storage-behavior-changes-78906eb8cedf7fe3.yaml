---
upgrade:
  - |
    ``Span.get_metric()`` and ``Span.get_metrics()`` now always return
    ``float``. Integers set via ``Span.set_metric()`` are stored internally
    as 64-bit floats and lose their original ``int`` type. Callers comparing
    metric values against integer constants with identity checks (``is``)
    should switch to equality (``==``) or cast explicitly with ``int()``.
    The return type annotation will be updated to ``float`` in a future
    5.0.0 release.
