---
features:
  - |
    LLMObs: ``LLMObs.get_prompt()`` now resolves prompts locally via the Feature Flags platform
    when ``DD_ENV`` is set, enabling sub-millisecond evaluation and A/B testing.
    The HTTP path remains as fallback and for label-based resolution.
    The signature is now keyword-only after ``prompt_id`` and accepts ``targeting_key``
    and ``**attributes`` for sticky bucketing and multi-attribute targeting.
