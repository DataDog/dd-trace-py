---
features:
  - |
    ray: Added ``DD_ML_JOB_ENV`` — a single opt-in env var for forwarding
    ddtrace configuration into Ray job workers. Set it on the dashboard process
    as a semicolon-separated list of ``KEY:VALUE`` pairs, e.g.
    ``TRACE_ENABLED:true;AGENT_HOST:10.0.0.1``, and workers receive them as
    ``DD_TRACE_ENABLED=true``, ``DD_AGENT_HOST=10.0.0.1``, etc. Only the
    explicitly listed keys are forwarded; secrets like ``DD_API_KEY`` are
    never written into Ray job specs.
