---
deprecations:
  - |
    AI Guard: the public SDK has moved from the ``ddtrace.appsec.ai_guard`` package to the
    top-level ``ddtrace.aiguard`` package. Importing from ``ddtrace.appsec.ai_guard`` is
    deprecated, now emits a ``ddtrace.DDTraceDeprecationWarning``, and will be removed in 5.0.0.
    As an alternative, update imports such as ``from ddtrace.appsec.ai_guard import AIGuardClient``
    to ``from ddtrace.aiguard import AIGuardClient``. The Strands Agents classes are the exception:
    import them from ``ddtrace.aiguard.integrations.strands`` (``AIGuardStrandsPlugin`` and
    ``AIGuardStrandsHookProvider`` are not re-exported from the top-level package).
