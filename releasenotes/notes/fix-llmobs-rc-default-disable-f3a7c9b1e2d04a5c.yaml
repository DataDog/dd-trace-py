---
fixes:
  - |
    LLM Observability: Fixes an issue where an APM_TRACING remote configuration
    payload that did not include an ``llmobs`` section would disable LLM
    Observability on services where it had been enabled via environment
    variables or ``LLMObs.enable()``. The handler now only changes LLMObs state
    when the remote configuration payload explicitly carries an
    ``llmobs.enabled`` directive.
