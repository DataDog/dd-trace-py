---
fixes:
  - |
    profiling: The stack profiler no longer crashes in environments where another
    component (for example PyTorch/CUDA, or abseil pulled in by vLLM/gRPC) installs
    its own ``SIGSEGV``/``SIGBUS`` handler that the profiler cannot wrap. The sampler
    now runs on a syscall-based memory copy during a short startup warmup window,
    upgrades to the faster fault-recovery copy only if it still owns both fault
    handlers afterwards, and permanently falls back to the syscall-based copy (or
    stops sampling if no safe copy method is available) if a foreign handler is
    installed later. This complements the existing ``faulthandler`` integration,
    which keeps the profiler's handler on top of components it can intercept, and
    removes the need for the ``_DD_PROFILING_STACK_FAST_COPY=0`` workaround in these
    environments.
