---
fixes:
  - |
    LLM Observability: Fixes an issue where span metadata bypassed the span processor,
    leaving sensitive data in metadata (for example auto-instrumented LangGraph tool
    configuration) impossible to redact. ``LLMObsSpan`` now exposes ``metadata`` for
    mutation or removal before export. Internal Datadog metadata is never exposed and
    cannot be modified through the span processor.
