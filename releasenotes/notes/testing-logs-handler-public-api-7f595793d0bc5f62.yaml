---
features:
  - |
    CI Visibility: Adds ``ddtrace.testing.logs.DDTestLogsHandler``, a public
    ``logging.Handler`` for shipping log records to the Datadog logs intake correlated
    with CI Visibility test traces, intended for use in subprocesses that execute tests
    outside of the main pytest process. Also adds ``ddtrace.testing.logs.CorrelationFilter``,
    a base class for stamping ``dd.trace_id`` / ``dd.span_id`` onto log records, and a
    ready-made ``ddtrace.testing.logs.ThreadLocalCorrelationFilter`` for the common
    thread-local case. Subclass ``CorrelationFilter`` to plug in other concurrency
    models (asyncio ``ContextVar``, global state, etc.).
