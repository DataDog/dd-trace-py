---
features:
  - |
    appsec: Add opt-in buffered stream response evaluation for AI Guard on Anthropic streaming
    calls. When ``DD_AI_GUARD_ANALYZE_STREAM_RESPONSES_ENABLED=true`` (default ``false``), all
    streamed chunks are buffered, the full assistant response is evaluated by AI Guard, and
    chunks are replayed to the caller only after an ALLOW verdict. On DENY/ABORT,
    ``AIGuardAbortError`` is raised and zero chunks are delivered. When the flag is off (the
    default), streaming behavior is unchanged.
