---
fixes:
  - |
    aiohttp: Fixes a ``TypeError: 'tuple' object does not support item assignment``
    raised when passing headers as a sequence of ``(key, value)`` tuples (aiohttp's
    ``LooseHeaders`` type) to request methods such as ``get`` or ``post``. Duplicate
    header entries (e.g. repeated ``Cookie`` values) are preserved in the outgoing
    request.
