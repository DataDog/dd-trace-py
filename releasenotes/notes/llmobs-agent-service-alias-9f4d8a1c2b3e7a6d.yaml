---
features:
  - |
    LLM Observability: Added ``agent_service`` and ``DD_AGENT_SERVICE`` as the preferred SDK configuration
    names for LLMObs application identity. Existing ``ml_app`` and ``DD_LLMOBS_ML_APP`` configuration
    remains supported but is deprecated and will be removed in the next major version of ddtrace.
    Note neither ``agent_service`` nor ``ml_app`` are not required configurations and ``DD_SERVICE`` will be used as a fallback if not specified.
