---
features:
  - |
    LLM Observability: Added ``agent_service`` as a preferred alias for the ``ml_app``
    argument across SDK methods (``LLMObs.enable(...)``, span constructors, decorators,
    ``submit_evaluation(...)``, ``get_spans(...)``, and ``publish_evaluator(...)``). When provided,
    ``agent_service`` takes precedence over the deprecated ``ml_app`` argument and over ``service``.
    When neither ``agent_service`` nor ``ml_app`` is set, application identity continues to resolve from
    a propagated parent value, then ``DD_LLMOBS_ML_APP``, then ``DD_SERVICE``.
upgrade:
  - |
    LLM Observability: Deprecates the ``ml_app`` argument and ``DD_LLMOBS_ML_APP`` environment variable,
    which will be removed in the next major version of ddtrace. Use ``agent_service`` and ``DD_SERVICE``
    instead to group traces belonging to a root agentic service (i.e. previously known as ML application).
