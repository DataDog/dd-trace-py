---
features:
  - |
    LLM Observability: Added ``agent_service`` and ``DD_AGENT_SERVICE`` as the preferred SDK configuration
    names for the LLMObs application identity. Existing ``ml_app`` and ``DD_LLMOBS_ML_APP`` configuration
    remains supported but is deprecated and will be removed in the next major version of ddtrace.
    For SDK paths that use default LLMObs configuration, ``DD_SERVICE`` and then the default ML app name remain
    fallbacks when neither ``agent_service`` nor ``ml_app`` is specified.
