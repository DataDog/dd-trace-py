---
fixes:
  - |
    LLM Observability: This fix resolves a token double-counting issue in the Claude Agent SDK integration.
    When the SDK split a single model turn into multiple ``AssistantMessage`` chunks that share a ``message_id``
    (each repeating the same message-level usage), the integration emitted one ``llm`` span per chunk and counted
    the turn's token usage multiple times. Chunks sharing a ``message_id`` are now merged into a single ``llm``
    span with the usage counted once. When ``message_id`` is unavailable (older ``claude-agent-sdk`` versions),
    the previous behavior is preserved.
