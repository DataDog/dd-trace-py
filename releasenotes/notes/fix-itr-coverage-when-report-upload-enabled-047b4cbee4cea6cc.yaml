---
fixes:
  - |
    CI Visibility: Test Impact Analysis per-test coverage and coverage report upload can
    now run simultaneously. ``CollectInContext`` now dynamically detects other
    ``sys.monitoring`` tools (e.g. coverage.py) at the start of each test and disables
    the ``DISABLE`` optimisation when any are present, so per-test ``restart_events()``
    calls stop happening once another tool is detected. The one remaining re-arm, which
    fires exactly once at the moment another tool is first detected, is scoped to
    Datadog's own tool via ``set_local_events()`` and cannot affect any other tool's
    monitoring state.
