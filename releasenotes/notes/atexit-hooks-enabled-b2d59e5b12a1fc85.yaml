---
features:
  - |
    tracing: Adds two per-product atexit hook controls (both default ``true``):
    ``DD_TRACE_ATEXIT_HOOKS`` for the tracer and ``DD_LLMOBS_ATEXIT_HOOKS`` for LLMObs.
    Set either to ``false`` to skip registering that product's atexit and exit-signal
    shutdown hooks, allowing you to manage its shutdown sequence manually. When disabled,
    call ``tracer.shutdown`` (tracer) or ``LLMObs.flush`` and ``LLMObs.disable`` (LLMObs)
    at the appropriate time. Note: this does not affect other ddtrace products (profiler,
    CI Visibility, serverless).
