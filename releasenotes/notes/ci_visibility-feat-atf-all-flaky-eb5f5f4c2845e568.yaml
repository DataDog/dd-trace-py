---
features:
  - |
    CI Visibility: Introduces "Attempt to fix all flaky" mode, a lower-friction flow
    for confirming that flaky tests have been fixed on the main branch. When enabled via
    the ``DD_TEST_MANAGEMENT_ATF_ALL_FLAKY`` environment variable, only tests previously
    marked as flaky are executed, each repeated 20 times consecutively. Tests that pass
    consistently across all attempts are automatically marked as fixed. Note that in this
    mode, non-flaky tests are not executed.

