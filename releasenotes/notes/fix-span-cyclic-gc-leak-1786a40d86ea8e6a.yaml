---
fixes:
  - |
    tracing: This fix resolves a memory leak where reference cycles through a
    span's ``meta_struct``, ``SpanLink.attributes`` or ``SpanEvent.attributes``
    were invisible to Python's cyclic garbage collector and accumulated
    proportionally to traced call volume. The native ``SpanData``, ``SpanLink``
    and ``SpanEvent`` classes now implement the cyclic-GC protocol.
