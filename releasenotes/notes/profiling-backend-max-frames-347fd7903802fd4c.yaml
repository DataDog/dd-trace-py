---
fixes:
  - |
    profiling: Fixes inconsistent handling of ``DD_PROFILING_MAX_FRAMES`` by aligning the profiler with the backend's 600-location limit. Values of 600 and above are now clamped to 599 before collectors start, reserving one location for the omitted-frame indicator, while values from 513 through 599 are no longer reduced to 512 by the native exporter.
