---
fixes:
  - |
    LLM Observability: Fixes incorrect span hierarchy in LLMObs traces when using the
    ddtrace SDK alongside OTel-based instrumentation (e.g. Strands Agents). OTel gen_ai
    spans (e.g. ``invoke_agent``) were incorrectly appearing as siblings of their SDK
    parent span (e.g. ``call_agent``) rather than being nested under it. SDK-submitted
    spans are now marked so the backend processor can preserve the correct parent-child
    relationship from the APM trace.
