---
features:
  - |
    kafka: When distributed tracing is enabled, the ``kafka.consume`` span now relates to
    every consumed message's producer trace via span links, instead of continuing a single
    producer's trace. This applies to both ``poll()`` (a single message) and ``consume()``
    (a batch): no producer is privileged as the span's parent, so the consume span and its
    children are no longer attached to an arbitrary producer's trace.
