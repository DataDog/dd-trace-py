---
features:
  - |
    kafka: When distributed tracing is enabled, a batched ``Consumer.consume()`` now
    links every message's producer trace to the ``kafka.consume`` span via span links,
    instead of parenting the span to only the first message's trace. This prevents the
    consume span and its children from being attached to an arbitrary single producer
    trace when a batch contains messages from multiple producers. Single-message
    ``poll()`` behavior is unchanged.
