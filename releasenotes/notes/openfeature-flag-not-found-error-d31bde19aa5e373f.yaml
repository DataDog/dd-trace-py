---
api:
  - |
    openfeature: Flag evaluations for non-existent flags now return ``Reason.ERROR`` with
    ``ErrorCode.FLAG_NOT_FOUND`` instead of ``Reason.DEFAULT`` when configuration is available
    but the flag is not found. The previous behavior (``Reason.DEFAULT``) is preserved when
    no configuration is loaded. This aligns Python with other Datadog SDK implementations.
