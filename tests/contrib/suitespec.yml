components:
  aiohttp:
    - ddtrace/contrib/aiohttp.py
    - ddtrace/contrib/internal/aiohttp/*
  aiohttp_jinja2:
    - ddtrace/contrib/internal/aiohttp_jinja2/*
  aiopg:
    - ddtrace/contrib/internal/aiopg/*
  aiokafka:
    - ddtrace/contrib/internal/aiokafka/*
    - ddtrace/ext/kafka.py
  algoliasearch:
    - ddtrace/contrib/internal/algoliasearch/*
  asgi:
    - ddtrace/contrib/asgi.py
    - ddtrace/contrib/internal/asgi/*
  asyncio:
    - ddtrace/contrib/internal/asyncio/*
  avro:
    - ddtrace/contrib/internal/avro/*
  aws_lambda:
    - ddtrace/contrib/internal/aws_lambda/*
    - ddtrace/ext/aws.py
  aws_durable_execution_sdk_python:
    - ddtrace/contrib/internal/aws_durable_execution_sdk_python/*
  azure_cosmos:
    - ddtrace/contrib/internal/azure_cosmos/*
  azure_durable_functions:
    - ddtrace/contrib/internal/azure_durable_functions/*
  azure_eventhubs:
    - ddtrace/contrib/internal/azure_eventhubs/*
    - ddtrace/ext/azure_eventhubs.py
  azure_functions:
    - ddtrace/contrib/internal/azure_functions/*
  azure_servicebus:
    - ddtrace/contrib/internal/azure_servicebus/*
    - ddtrace/ext/azure_servicebus.py
  botocore:
    - ddtrace/contrib/internal/botocore/*
    - ddtrace/contrib/internal/boto/*
    - ddtrace/contrib/internal/aiobotocore/*
  bottle:
    - ddtrace/contrib/bottle.py
    - ddtrace/contrib/internal/bottle/*
  celery:
    - ddtrace/contrib/celery.py
    - ddtrace/contrib/internal/celery/*
    - tests/snapshots/tests.contrib.celery.*
  cherrypy:
    - ddtrace/contrib/cherrypy.py
    - ddtrace/contrib/internal/cherrypy/*
  consul:
    - ddtrace/contrib/internal/consul/*
    - ddtrace/ext/consul.py
  contrib:
    # Shared package infrastructure (not covered by any specific component)
    - ddtrace/contrib/__init__.py
    - ddtrace/contrib/trace_utils.py
    - ddtrace/contrib/_events/*
    - ddtrace/contrib/internal/__init__.py
    - ddtrace/contrib/internal/trace_utils.py
    - ddtrace/contrib/internal/trace_utils_async.py
    - ddtrace/contrib/internal/trace_utils_base.py
    # Shared ext files used broadly across many integrations
    - ddtrace/ext/__init__.py
    - ddtrace/ext/http.py
    - ddtrace/ext/net.py
    - ddtrace/ext/user.py
    - ddtrace/ext/websocket.py
    # Propagation and settings shared across all integrations
    - ddtrace/propagation/*
    - ddtrace/internal/settings/_database_monitoring.py
    # Shared test utilities
    - tests/contrib/patch.py
    - tests/contrib/config.py
    - tests/contrib/__init__.py
    - tests/contrib/suitespec.yml
  coverage:
    - ddtrace/contrib/internal/coverage/*
  dbapi:
    - ddtrace/contrib/dbapi.py
    - ddtrace/contrib/dbapi_async.py
    - ddtrace/ext/db.py
    - ddtrace/ext/sql.py
  ddtrace_api:
    - ddtrace/contrib/internal/ddtrace_api/*
    - tests/snapshots/tests.contrib.ddtrace_api.*
  django:
    - ddtrace/contrib/internal/django/*
  dogpile_cache:
    - ddtrace/contrib/internal/dogpile_cache/*
  dramatiq:
    - ddtrace/contrib/internal/dramatiq/*
  elasticsearch:
    - ddtrace/contrib/internal/elasticsearch/*
    - ddtrace/ext/elasticsearch.py
  falcon:
    - ddtrace/contrib/falcon.py
    - ddtrace/contrib/internal/falcon/*
  fastapi:
    - ddtrace/contrib/internal/fastapi/*
  flask:
    - ddtrace/contrib/internal/flask/*
    - ddtrace/contrib/flask_cache.py
    - ddtrace/contrib/internal/flask_cache/*
  futures:
    - ddtrace/contrib/internal/futures/*
  gevent:
    - ddtrace/contrib/internal/gevent/*
  google_cloud_pubsub:
    - ddtrace/contrib/internal/google_cloud_pubsub/*
  graphql:
    - ddtrace/contrib/internal/graphql/*
  grpc:
    - ddtrace/contrib/internal/grpc/*
  gunicorn:
    - ddtrace/contrib/internal/gunicorn/*
  httplib:
    - ddtrace/contrib/internal/httplib/*
  httpx:
    - ddtrace/contrib/internal/httpx/*
  integration_registry:
    - scripts/integration_registry/*
  jinja2:
    - ddtrace/contrib/internal/jinja2/*
  kafka:
    - ddtrace/contrib/internal/kafka/*
    - ddtrace/ext/kafka.py
  kombu:
    - ddtrace/contrib/internal/kombu/*
    - ddtrace/ext/kombu.py
    - tests/snapshots/tests.contrib.kombu.*
  logbook:
    - ddtrace/contrib/internal/logbook/*
  logging:
    - ddtrace/contrib/internal/logging/*
  loguru:
    - ddtrace/contrib/internal/loguru/*
  mako:
    - ddtrace/contrib/internal/mako/*
  mlflow:
    - ddtrace/contrib/internal/mlflow/*
  mariadb:
    - ddtrace/contrib/internal/mariadb/*
  molten:
    - ddtrace/contrib/internal/molten/*
  mongo:
    - ddtrace/contrib/internal/pymongo/*
    - ddtrace/ext/mongo.py
  mysql:
    - ddtrace/contrib/internal/mysql/*
    - ddtrace/contrib/internal/mysqldb/*
    - ddtrace/contrib/internal/pymysql/*
    - ddtrace/contrib/internal/aiomysql/*
  pg:
    - ddtrace/contrib/internal/aiopg/*
    - ddtrace/contrib/internal/psycopg/*
    - ddtrace/contrib/internal/asyncpg/*
  protobuf:
    - ddtrace/contrib/internal/protobuf/*
  pylibmc:
    - ddtrace/contrib/pylibmc.py
    - ddtrace/contrib/internal/pylibmc/*
  pymemcache:
    - ddtrace/contrib/internal/pymemcache/*
    - ddtrace/ext/memcached.py
  pynamodb:
    - ddtrace/contrib/internal/pynamodb/*
  pyodbc:
    - ddtrace/contrib/internal/pyodbc/*
  pyramid:
    - ddtrace/contrib/pyramid.py
    - ddtrace/contrib/internal/pyramid/*
  ray:
    - ddtrace/contrib/internal/ray/*
    - ddtrace/contrib/ray.py
  redis:
    - ddtrace/contrib/internal/rediscluster/*
    - ddtrace/contrib/internal/redis/*
    - ddtrace/contrib/internal/aredis/*
    - ddtrace/contrib/internal/yaaredis/*
    - ddtrace/contrib/internal/redis_utils.py
    - ddtrace/ext/redis.py
  requests:
    - ddtrace/contrib/requests.py
    - ddtrace/contrib/internal/requests/*
  rq:
    - ddtrace/contrib/internal/rq/*
  sanic:
    - ddtrace/contrib/internal/sanic/*
  snowflake:
    - ddtrace/contrib/internal/snowflake/*
  sqlalchemy:
    - ddtrace/contrib/sqlalchemy.py
    - ddtrace/contrib/internal/sqlalchemy/*
  sqlite3:
    - ddtrace/contrib/internal/sqlite3/*
  starlette:
    - ddtrace/contrib/internal/starlette/*
  structlog:
    - ddtrace/contrib/internal/structlog/*
  subprocess:
    - ddtrace/contrib/internal/subprocess/*
  tornado:
    - ddtrace/contrib/internal/tornado/*
  urllib3:
    - ddtrace/contrib/internal/urllib3/*
  valkey:
    - ddtrace/contrib/internal/valkey/*
    - ddtrace/contrib/internal/valkey_utils.py
    - ddtrace/_trace/utils_valkey.py
    - ddtrace/ext/valkey.py
  vertica:
    - ddtrace/contrib/internal/vertica/*
  wsgi:
    - ddtrace/contrib/wsgi.py
    - ddtrace/contrib/internal/wsgi/*
suites:
  aiobotocore:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@botocore'
      - tests/contrib/aiobotocore/*
    services:
      - moto
    env:
      TEST_MOTO_PORT: '3000'
    snapshot: true
    venvs_per_job: 2
  aiohttp:
    pattern: ^aiohttp$
    venvs_per_job: 3
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@aiohttp'
      - tests/contrib/aiohttp/*
      - tests/snapshots/tests.{suite}.*
    services:
      - httpbin
    snapshot: true
  aiohttp_jinja2:
    venvs_per_job: 6
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@aiohttp'
      - '@aiohttp_jinja2'
      - tests/contrib/aiohttp/*
      - tests/contrib/aiohttp_jinja2/*
      - tests/snapshots/tests.{suite}.*
    services:
      - httpbin
    snapshot: true
  aiomysql:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@dbapi'
      - '@mysql'
      - tests/contrib/aiomysql/*
      - tests/snapshots/tests.{suite}.*
      - tests/contrib/shared_tests_async.py
    services:
      - mysql
    snapshot: true
  aiokafka:
    env:
      TEST_KAFKA_HOST: kafka
      TEST_KAFKA_PORT: '29092'
    venvs_per_job: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@contrib'
      - '@aiokafka'
      - '@datastreams'
      - tests/contrib/aiokafka/*
      - tests/snapshots/tests.contrib.aiokafka.*
    services:
      - kafka
    snapshot: true
  aiopg:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@dbapi'
      - '@pg'
      - '@aiopg'
      - tests/contrib/aiopg/*
      - tests/contrib/shared_tests_async.py
    snapshot: true
    services:
      - postgres
    venvs_per_job: 2
  algoliasearch:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@algoliasearch'
      - tests/contrib/algoliasearch/*
    snapshot: true
  aredis:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@redis'
      - tests/contrib/aredis/*
      - tests/snapshots/tests.{suite}.*
    pattern: aredis$
    services:
      - redis
    snapshot: true
  asgi:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@asyncio'
      - '@appsec'
      - '@asgi'
      - tests/contrib/asgi/*
    pattern: asgi$
    snapshot: true
  asyncpg:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@pg'
      - tests/contrib/asyncpg/*
      - tests/snapshots/tests.{suite}.*
      - tests/contrib/shared_tests_async.py
    snapshot: true
    services:
      - postgres
  asynctest:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - tests/contrib/asynctest/*
    pattern: asynctest$
  avro:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@avro'
      - tests/contrib/avro/*
    snapshot: true
  aws_lambda:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@aws_lambda'
      - tests/contrib/aws_lambda/*
      - tests/snapshots/tests.{suite}.*
    snapshot: true
  aws_durable_execution_sdk_python:
    venvs_per_job: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@aws_durable_execution_sdk_python'
      - tests/contrib/aws_durable_execution_sdk_python/*
      - tests/snapshots/tests.{suite}.*
    snapshot: true
  azure_cosmos:
    venvs_per_job: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_cosmos'
      - tests/contrib/azure_cosmos/*
      - tests/snapshots/tests.contrib.azure_cosmos.*
    snapshot: true
    services:
      - azurite
      - azurecosmosemulator
  azure_eventhubs:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_eventhubs'
      - tests/contrib/azure_eventhubs/*
      - tests/snapshots/tests.contrib.azure_eventhubs.*
    snapshot: true
    services:
      - azurite
      - azureeventhubsemulator
  azure_durable_functions:
    venvs_per_job: 3
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_durable_functions'
      - tests/contrib/azure_durable_functions/*
      - tests/snapshots/tests.contrib.azure_durable_functions.*
    snapshot: true
    services:
      - azurite
  # the azure_functions suites don't work in the arm64 testrunner container
  # (the one that runs from scripts/ddtest on Mac OS)
  # they can be run on OSX bare metal after `brew tap azure/functions && brew install azure-functions-core-tools@4`
  azure_functions:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_functions'
      - tests/contrib/azure_functions/*
      - tests/snapshots/tests.contrib.azure_functions.*
    pattern: ^azure_functions$
    snapshot: true
    services:
      - azurite
  azure_functions:cosmos:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_functions'
      - '@azure_cosmos'
      - tests/contrib/azure_functions_cosmos/*
      - tests/snapshots/tests.contrib.azure_functions_cosmos.*
    pattern: azure_functions:cosmos
    snapshot: true
    services:
      - azurite
      - azurecosmosemulator
  azure_functions:eventhubs:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_functions'
      - '@azure_eventhubs'
      - tests/contrib/azure_functions_eventhubs/*
      - tests/snapshots/tests.contrib.azure_functions_eventhubs.*
    pattern: azure_functions:eventhubs
    snapshot: true
    services:
      - azurite
      - azureeventhubsemulator
  azure_functions:servicebus:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_functions'
      - '@azure_servicebus'
      - tests/contrib/azure_functions_servicebus/*
      - tests/snapshots/tests.contrib.azure_functions_servicebus.*
    pattern: azure_functions:servicebus
    snapshot: true
    services:
      - azurite
      - azuresqledge
      - azureservicebusemulator
  azure_servicebus:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@azure_servicebus'
      - tests/contrib/azure_servicebus/*
      - tests/snapshots/tests.contrib.azure_servicebus.*
    snapshot: true
    services:
      - azuresqledge
      - azureservicebusemulator
  botocore:
    parallelism: 11
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@llmobs'
      - '@botocore'
      - '@datastreams'
      - tests/contrib/botocore/*
      - tests/contrib/boto/*
      - tests/snapshots/tests.contrib.botocore*
    pattern: ^botocore$
    snapshot: true
    services:
      - localstack
  bottle:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@bottle'
      - tests/contrib/bottle/*
    snapshot: true
  celery:
    env:
      DD_DISABLE_ERROR_RESPONSES: true
      DD_POOL_TRACE_CHECK_FAILURES: true
      ENABLED_CHECKS: trace_stall,meta_tracer_version_header,trace_content_length,trace_peer_service,trace_dd_service
      LOG_LEVEL: DEBUG
      PORT: 9126
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@celery'
      - tests/contrib/celery/*
    services:
      - rabbitmq
      - redis
    snapshot: true
    venvs_per_job: 1
  cherrypy:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@cherrypy'
      - tests/contrib/cherrypy/*
      - tests/snapshots/tests.{suite}.*
    snapshot: true
    venvs_per_job: 2
  consul:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@consul'
      - tests/contrib/consul/*
    snapshot: true
    services:
      - consul
  datastreams:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@datastreams'
      - tests/datastreams/*
  ddtrace_api:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@ddtrace_api'
      - tests/contrib/ddtrace_api/*
    snapshot: true
  django:
    parallelism: 6
    env:
      TEST_MEMCACHED_HOST: memcached
      TEST_POSTGRES_HOST: postgres
      TEST_REDIS_HOST: redis
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@contrib'
      - '@appsec'
      - '@appsec_iast'
      - '@asgi'
      - '@wsgi'
      - '@django'
      - '@dbapi'
      - '@pg'
      - tests/appsec/*
      - tests/contrib/django/*
      - tests/contrib/django_celery/*
      - tests/snapshots/tests.{suite}.*
    pattern: ^(django|django:celery)$
    services:
      - postgres
      - memcached
      - redis
    snapshot: true
  django_hosts:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@appsec'
      - '@django'
      - tests/snapshots/tests.{suite}.*
      - tests/contrib/django_hosts/*
      - tests/contrib/django_hosts/django_app/*
    pattern: django:django_hosts
    snapshot: true
  django:djangorestframework:
    parallelism: 2
    env:
      TEST_MEMCACHED_HOST: memcached
      TEST_REDIS_HOST: redis
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@appsec'
      - '@django'
      - tests/contrib/djangorestframework/*
      - tests/contrib/djangorestframework/app/*
    pattern: django:djangorestframework
    services:
      - memcached
      - redis
    snapshot: true
  dogpile_cache:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@dogpile_cache'
      - tests/contrib/dogpile_cache/*
    snapshot: true
    venvs_per_job: 3
  dramatiq:
    env:
      TEST_REDIS_HOST: redis
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@dramatiq'
      - tests/contrib/dramatiq/*
      - tests/snapshots/tests.contrib.dramatiq.*
    services:
      - redis
      - rabbitmq
    snapshot: true
  elasticsearch:
    env:
      TEST_ELASTICSEARCH_HOST: elasticsearch
      TEST_OPENSEARCH_HOST: opensearch
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@contrib'
      - '@elasticsearch'
      - tests/contrib/elasticsearch/*
      - tests/snapshots/tests.{suite}.*
    services:
      - opensearch
      - elasticsearch
    snapshot: true
  falcon:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@falcon'
      - tests/contrib/falcon/*
    snapshot: true
    venvs_per_job: 2
  fastapi:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@starlette'
      - '@fastapi'
      - '@asgi'
      - '@asyncio'
      - tests/contrib/fastapi/*
      - tests/snapshots/tests.contrib.starlette.*
      - tests/snapshots/tests.{suite}.*
    snapshot: true
    venvs_per_job: 2
  flask:
    env:
      TEST_MEMCACHED_HOST: memcached
      TEST_REDIS_HOST: redis
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@flask'
      - '@appsec'
      - '@appsec_iast'
      - '@wsgi'
      - '@redis'
      - tests/appsec/*
      - tests/contrib/flask/*
      - tests/contrib/flask_autopatch/*
      - tests/contrib/flask_cache/*
      - tests/snapshots/tests.contrib.flask.*
    services:
      - memcached
      - redis
    snapshot: true
  gevent:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@gevent'
      - tests/contrib/gevent/*
    snapshot: false
    venvs_per_job: 2
  google_cloud_pubsub:
    env:
      TEST_PUBSUB_HOST: pubsub
      TEST_PUBSUB_PORT: '8085'
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@contrib'
      - '@google_cloud_pubsub'
      - tests/contrib/google_cloud_pubsub/*
      - tests/snapshots/tests.contrib.google_cloud_pubsub.*
    services:
      - pubsub
    snapshot: true
    venvs_per_job: 3
  graphql:graphene:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@graphql'
      - tests/contrib/graphene/*
      - tests/snapshots/tests.contrib.graphene*
    snapshot: true
  graphql:
    parallelism: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@graphql'
      - tests/contrib/graphql/*
      - tests/snapshots/tests.contrib.graphql.*
    pattern: graphql$
    snapshot: true
  grpc:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@grpc'
      - tests/contrib/grpc/*
      - tests/contrib/grpc_aio/*
      - tests/snapshots/tests.contrib.grpc.*
    snapshot: true
    venvs_per_job: 3
  gunicorn:
    parallelism: 6
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@gunicorn'
      - tests/contrib/gunicorn/*
      - tests/snapshots/tests.contrib.gunicorn.*
    snapshot: true
  httplib:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@httplib'
      - tests/contrib/httplib/*
    services:
      - httpbin
    snapshot: true
    venvs_per_job: 1
  httpx:
    parallelism: 3
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@contrib'
      - '@httpx'
      - tests/contrib/httpx/*
      - tests/snapshots/tests.contrib.httpx.*
    services:
      - httpbin
    snapshot: true
  integration_registry:
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@integration_registry'
      - tests/contrib/integration_registry/*
    snapshot: false
    parallelism: 1
  jinja2:
    parallelism: 2
    paths:
      - '@bootstrap'
      - '@core'
      - '@contrib'
      - '@tracing'
      - '@jinja2'
      - tests/contrib/jinja2/*
    snapshot: true
  kafka:
    env:
