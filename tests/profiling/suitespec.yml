---
components:
  profiling:
    - ddtrace/profiling/*
    - ddtrace/internal/datadog/profiling/*
    - ddtrace/internal/processor/endpoint_call_counter.py
    - ddtrace/internal/settings/profiling.py
suites:
  profile:
    env:
      DD_TRACE_AGENT_URL: ''
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@profiling'
      - '@vendor'
      - tests/profiling/suitespec.yml
      - tests/profiling/*
    pattern: profile$
    retry: 2
  profile-uwsgi:
    env:
      DD_TRACE_AGENT_URL: ''
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@profiling'
      - '@vendor'
      - tests/profiling/suitespec.yml
      - tests/profiling/*
    pattern: profile-uwsgi
    retry: 2
  profile-memalloc:
    env:
      DD_TRACE_AGENT_URL: ''
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@profiling'
      - '@vendor'
      - tests/profiling/suitespec.yml
      - tests/profiling/*
    pattern: profile-memalloc
    retry: 2
