---
components:
  appsec:
    - ddtrace/appsec/*
    - '!ddtrace/appsec/ai_guard/*'
    - '!ddtrace/appsec/_ai_guard/*'
    - '!ddtrace/appsec/iast/*'
    - '!ddtrace/appsec/_iast/*'
    - '!ddtrace/appsec/sca/*'
    - ddtrace/internal/settings/asm.py
  appsec_iast:
    - ddtrace/appsec/iast/*
    - ddtrace/appsec/_iast/*
  urllib:
    - ddtrace/contrib/internal/urllib/*
  webbrowser:
    - ddtrace/contrib/internal/webbrowser/*
  ai_guard:
    - ddtrace/appsec/ai_guard/*
  sca:
    - ddtrace/appsec/sca/*
suites:
  appsec:
    parallelism: 4
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@remoteconfig'
      - tests/appsec/*
    pattern: appsec$
    retry: 2
    snapshot: true
  appsec_iast_default:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/iast/*
    retry: 2
    timeout: 30m
  appsec_iast_memcheck:
    env:
      CI_DEBUG_TRACE: 'true'
    parallelism: 6
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/iast/*
      - tests/appsec/iast_memcheck/*
    retry: 2
    timeout: 30m
  appsec_iast_native:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec_iast'
      - '@remoteconfig'
    retry: 2
  iast_aggregated_leak_testing:
    venvs_per_job: 1
    paths:
      - '@appsec_iast'
      - 'tests/appsec/iast_aggregated_memcheck/*'
  appsec_iast_packages:
    venvs_per_job: 1
    paths:
      - '@appsec_iast'
      - tests/appsec/iast_packages/*
    timeout: 50m
  iast_tdd_propagation:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/iast_tdd_propagation/*
    retry: 2
    snapshot: true
  appsec_integrations_pygoat:
    parallelism: 3
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/integrations/pygoat_tests/*
      - tests/snapshots/tests.appsec.*
    retry: 2
    snapshot: true
  appsec_integrations_packages:
    env:
      TEST_POSTGRES_HOST: postgres
      TEST_MYSQL_HOST: mysql
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/iast/*
      - tests/appsec/integrations/packages_tests/*
    retry: 2
    services:
      - postgres
      - mysql
  appsec_integrations_stripe:
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - tests/appsec/integrations/stripe_tests/*
    retry: 2
  appsec_integrations_langchain:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/iast/*
      - tests/appsec/integrations/langchain_tests/*
    retry: 2
  appsec_integrations_flask:
    pattern: appsec_integrations_flask$
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - tests/appsec/integrations/flask_tests/test_iast_flask.py
      - tests/appsec/integrations/flask_tests/test_appsec_flask_telemetry.py
    retry: 2
    timeout: 15m
  appsec_integrations_flask_testagent:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/integrations/flask_tests/*
    retry: 2
    services:
      - testagent
    timeout: 40m
  appsec_integrations_django:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/integrations/django_tests/*
    retry: 2
    services:
      - testagent
    timeout: 30m
  appsec_integrations_fastapi:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@remoteconfig'
      - tests/appsec/integrations/fastapi_tests/*
    retry: 2
    services:
      - testagent
  appsec_threats_django_no_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@django'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_django_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@asgi'
      - '@wsgi'
      - '@django'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_django_rc:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@django'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_fastapi_no_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@fastapi'
      - '@starlette'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_fastapi_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@asgi'
      - '@wsgi'
      - '@fastapi'
      - '@starlette'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_fastapi_rc:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@fastapi'
      - '@starlette'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_flask_no_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@flask'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_flask_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
      - '@core'
      - '@tracing'
      - '@appsec'
      - '@appsec_iast'
      - '@asgi'
      - '@wsgi'
      - '@flask'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_flask_rc:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
