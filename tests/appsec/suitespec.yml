      - '@tracing'
      - '@appsec'
      - '@asgi'
      - '@wsgi'
      - '@flask'
      - '@remoteconfig'
      - tests/appsec/*
      - tests/appsec/contrib_appsec/*
    retry: 2
  appsec_threats_tornado_no_iast:
    venvs_per_job: 1
    paths:
      - '@bootstrap'
