id: fork-without-subprocess-marker
valid:
  # Test function with @pytest.mark.subprocess and os.fork() — OK
  - |
    @pytest.mark.subprocess()
    def test_fork_in_subprocess():
        import os
        pid = os.fork()
        if pid == 0:
            os._exit(0)
        os.waitpid(pid, 0)
  # Test function with @pytest.mark.subprocess and multiprocessing.Process — OK
  - |
    @pytest.mark.subprocess()
    def test_multiprocess_in_subprocess():
        import multiprocessing
        p = multiprocessing.Process(target=lambda: None)
        p.start()
        p.join()
  # Non-test function calling os.fork() — not a test, rule doesn't apply
  - |
    def helper_fork():
        import os
        pid = os.fork()
        if pid == 0:
            os._exit(0)
  # Non-test function using multiprocessing.Process — not a test, rule doesn't apply
  - |
    def spawn_worker():
        import multiprocessing
        p = multiprocessing.Process(target=lambda: None)
        p.start()

