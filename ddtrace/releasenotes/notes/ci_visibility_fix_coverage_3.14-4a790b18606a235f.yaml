---
fixes:
  - |
    CI Visibility: Fixes code coverage instrumentation on Python 3.13, 3.14, and 3.15.
    Resolves lost per-test line data caused by: ``sys.monitoring`` callbacks running in
    a snapshot context where ``ContextVar`` changes are not visible (Python 3.14+);
    empty modules emitting no ``LINE`` events (Python 3.13+); and
    ``ProcessPoolExecutor`` child coverage not being propagated to the parent context.
    Also fixes a stale-data bug where child process executable lines could inflate
    coverage denominators after ``stop_coverage()`` was called before ``join()``.
