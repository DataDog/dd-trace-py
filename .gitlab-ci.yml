# =============================================================================
# TEMPORARY DEBUG CONFIGURATION - FLAKY TEST INVESTIGATION
# This configuration runs test_asm_standalone_minimum_trace_per_minute_has_no_downstream_propagation
# 100 times across all tracer venvs to identify flaky behavior.
#
# TO REVERT: git checkout main -- .gitlab-ci.yml
# =============================================================================

stages:
  - tests

variables:
  REPO_LANG: python
  TESTRUNNER_IMAGE: registry.ddbuild.io/dd-trace-py:v81799905-0f9bd8b-testrunner@sha256:f29e49e817cb3fdcc188414b9e94bd9244df7db00b72205738a752ab23953cc5

default:
  interruptible: true

workflow:
  rules:
    - when: always

include:
  - local: ".gitlab/services.yml"

.testrunner:
  image:
    name: ${TESTRUNNER_IMAGE}
    docker:
      user: bits
  tags: [ "arch:amd64" ]
  timeout: 60m
  before_script:
    - ulimit -c unlimited
    - git config --global --add safe.directory ${CI_PROJECT_DIR}
    - pyenv global 3.12 3.9 3.10 3.11 3.13 3.14
  retry: 0
  artifacts:
    reports:
      junit: test-results/junit*.xml

# All tracer hashes: 107d2ec 108afed 128b106 1303be6 190fcc7 19c9071 1b5081e 1cb6659 1ef5a52 1fa38a1 4fcf978 c48b0f7 cf86081 ed437ab
debug-flaky-test:
  extends: .testrunner
  stage: tests
  services:
    - !reference [.services, ddagent]
  parallel:
    matrix:
      - RIOT_HASH: ["107d2ec", "c48b0f7", "1fa38a1", "108afed", "128b106", "1303be6", "190fcc7"]
      - RIOT_HASH: ["19c9071", "1b5081e", "1cb6659", "1ef5a52", "4fcf978", "cf86081", "ed437ab"]
  variables:
    TEST_NAME: "test_asm_standalone_minimum_trace_per_minute_has_no_downstream_propagation"
    TEST_FILE: "tests/tracer/test_propagation.py"
    NUM_RUNS: "100"
    CMAKE_BUILD_PARALLEL_LEVEL: "12"
    CARGO_BUILD_JOBS: "12"
  script:
    - |
      echo "========================================"
      echo "DEBUG FLAKY TEST: ${TEST_NAME}"
      echo "RIOT HASH: ${RIOT_HASH}"
      echo "RUNNING ${NUM_RUNS} TIMES"
      echo "========================================"
    - unset DD_SERVICE DD_ENV DD_TAGS DD_TRACE_REMOVE_INTEGRATION_SERVICE_NAMES_ENABLED
    - |
      echo "Venv info for hash ${RIOT_HASH}:"
      riot list "${RIOT_HASH}"
    - |
      FAILURES=0
      for i in $(seq 1 ${NUM_RUNS}); do
        echo ""
        echo "======== RUN ${i}/${NUM_RUNS} (hash: ${RIOT_HASH}) ========"
        # First run: install the project. Subsequent runs: skip install (-s).
        if [ ${i} -eq 1 ]; then
          RIOT_CMD="riot -P -v run --pass-env ${RIOT_HASH}"
        else
          RIOT_CMD="riot -P -v run --pass-env -s ${RIOT_HASH}"
        fi
        if ! ${RIOT_CMD} -- ${TEST_FILE}::${TEST_NAME} -v --no-cov; then
          echo "FAILED on run ${i}"
          FAILURES=$((FAILURES + 1))
        fi
      done
      echo ""
      echo "========================================"
      echo "SUMMARY for hash ${RIOT_HASH}:"
      echo "Total runs: ${NUM_RUNS}"
      echo "Failures: ${FAILURES}"
      echo "Success rate: $(echo "scale=2; (${NUM_RUNS} - ${FAILURES}) * 100 / ${NUM_RUNS}" | bc)%"
      echo "========================================"
      if [ ${FAILURES} -gt 0 ]; then
        echo "TEST IS FLAKY: ${FAILURES}/${NUM_RUNS} failures"
        exit 1
      fi
