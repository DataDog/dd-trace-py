# Minimal throwaway pipeline for cross-repo trigger prototyping.
# Replaces the full dd-trace-py CI with a single `test` job so we can iterate
# fast on libdatadog -> dd-trace-py cross-pipeline triggering. The original
# pipeline can be restored from git history.

test:
  image: registry.ddbuild.io/images/mirror/alpine:3.20
  tags: ["arch:amd64"]
  variables:
    SHOULD_FAIL: "false"
  script:
    - echo "=== forwarded variables ==="
    - echo "SHOULD_FAIL=${SHOULD_FAIL}"
    - echo "PARENT_MARKER=${PARENT_MARKER}"
    - echo "LIBDATADOG_SHA=${LIBDATADOG_SHA}"
    - echo "PATCH_MODE=${PATCH_MODE}"
    - echo "SOURCE_REPO=${SOURCE_REPO}"
    - echo "SOURCE_BRANCH=${SOURCE_BRANCH}"
    - echo "=== full environment ==="
    - env | sort
    - |
      if [ "${SHOULD_FAIL}" = "true" ]; then
        echo "SHOULD_FAIL is true -> exiting 1"
        exit 1
      fi
    - echo "SHOULD_FAIL is not true -> exiting 0"
    - exit 0
