# Podman-only Compose file for environments where port mappings cannot modify
# route_localnet (for example, Bits Code). This file is standalone because the
# Podman Compose version used by Bits does not support Docker Compose YAML tags.
services:
    elasticsearch:
        image: elasticsearch:9.4.2
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
        network_mode: host
    opensearch:
        image: opensearchproject/opensearch:3.7.0
        environment:
            - "DISABLE_SECURITY_PLUGIN=true"
            - "discovery.type=single-node"
            - http.port=9201
        network_mode: host
    cassandra:
        image: cassandra:5.0.8
        environment:
            - MAX_HEAP_SIZE=512M
            - HEAP_NEWSIZE=256M
        network_mode: host
    consul:
        image: consul:1.15.4
        network_mode: host
    postgres:
        image: postgres:18-alpine
        environment:
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_DB=postgres
        network_mode: host
    mariadb:
        image: mariadb:lts
        environment:
            - MYSQL_ROOT_PASSWORD=example
            - MYSQL_DATABASE=test
            - MYSQL_USER=test
            - MYSQL_PASSWORD=test
        network_mode: host
    mysql:
        image: mysql:9.7.1
        platform: linux/amd64
        environment:
            - MYSQL_ROOT_PASSWORD=admin
            - MYSQL_PASSWORD=test
            - MYSQL_USER=test
            - MYSQL_DATABASE=test
        network_mode: host
    redis:
        image: redis:8.8-alpine
        network_mode: host
    kafka:
        platform: linux/arm64
        image: apache/kafka:4.2.0
        environment:
            - ALLOW_PLAINTEXT_LISTENER=yes
            - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
            - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,EXTERNAL://localhost:29092
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - KAFKA_NODE_ID=1
            - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
            - KAFKA_PROCESS_ROLES=broker,controller
            - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
            - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
        network_mode: host
    rediscluster:
        platform: linux/amd64
        image: grokzen/redis-cluster:7.2.5
        environment:
            - IP=0.0.0.0
        network_mode: host
    mongo:
        image: mongo:8.2.11
        network_mode: host
    memcached:
        image: memcached:1.6.42-alpine
        network_mode: host
    moto:
        image: motoserver/moto:5.2.2
        environment:
            - MOTO_PORT=3000
        network_mode: host
    rabbitmq:
        image: rabbitmq:4.3.2-alpine
        network_mode: host
    ddagent:
        image: datadog/agent:latest
        environment:
            - DD_HOSTNAME=github-actions-worker
            - DD_BIND_HOST=0.0.0.0
            - DD_REMOTE_CONFIGURATION_ENABLED=true
            - DD_SITE=${DD_SITE-datadoghq.com}
            - DD_API_KEY=${DD_API_KEY-invalid_but_this_is_fine}
            - DD_REMOTE_CONFIGURATION_KEY=${DD_REMOTE_CONFIGURATION_KEY-invalid_but_this_is_fine}
            - DD_REMOTE_CONFIGURATION_REFRESH_INTERVAL=5s
            - DD_APM_RECEIVER_SOCKET=/tmp/ddagent/trace.sock
            - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
        volumes:
          - ddagent:/tmp/ddagent:rw
        network_mode: host
    testagent:
        image: ghcr.io/datadog/dd-apm-test-agent/ddapm-test-agent:v1.62.0
        volumes:
            - ./tests/snapshots:/snapshots
            - ./tests/cassettes:/cassettes
        environment:
            - LOG_LEVEL=WARNING
            - SNAPSHOT_DIR=/snapshots
            - VCR_CASSETTES_DIRECTORY=/cassettes
            - VCR_PROVIDER_MAP=azure_openai=https://llmobs-test-resource.openai.azure.com/,mistral=https://api.mistral.ai/
            - SNAPSHOT_CI=0
            - DD_POOL_TRACE_CHECK_FAILURES=true
            - DD_DISABLE_ERROR_RESPONSES=true
            - ENABLED_CHECKS=trace_content_length,trace_stall,meta_tracer_version_header,trace_count_header,trace_peer_service,trace_dd_service
            - SNAPSHOT_IGNORED_ATTRS=span_id,trace_id,parent_id,duration,start,metrics.system.pid,metrics.system.process_id,metrics.process_id,meta.runtime-id,meta._dd.p.tid,meta.pathway.hash,metrics._dd.tracer_kr,meta._dd.parent_id,meta.kafka.cluster_id,meta._dd.git.repository_url
        # Host networking does not translate ports. Preserve the normal public
        # test-agent endpoint so existing tests that use localhost:9126 work.
        command: ["ddapm-test-agent", "--port=9126"]
        network_mode: host
    vertica:
        image: vertica/vertica-ce
        environment:
          - VP_TEST_USER=dbadmin
          - VP_TEST_PASSWORD=abc123
          - VP_TEST_DATABASE=docker
        network_mode: host
    azurecosmosemulator:
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
        environment:
            ACCEPT_EULA: "Y"
            BLOB_SERVER: azurite
            METADATA_SERVER: azurite
        network_mode: host
    azureeventhubsemulator:
        image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:2.2.0
        environment:
            ACCEPT_EULA: "Y"
            BLOB_SERVER: azurite
            METADATA_SERVER: azurite
        network_mode: host
    azureservicebusemulator:
        image: mcr.microsoft.com/azure-messaging/servicebus-emulator:2.0.0
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "Localtestpass1!"
            SQL_SERVER: dd-trace-py-azuresqledge-1
        network_mode: host
    azuresqledge:
        image: mcr.microsoft.com/azure-sql-edge:2.0.0
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "Localtestpass1!"
        network_mode: host
    azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.35.0
        network_mode: host
    selenium-chrome:
        image: selenium/standalone-chrome:latest
        platform: linux/amd64
        network_mode: host
        environment:
            - SE_NODE_MAX_SESSIONS=2
            - SE_VNC_NO_PASSWORD=1
        shm_size: 2g
    testrunner:
        # DEV uncomment to test local changes to the Dockerfile
        # build:
        #  context: ./docker
        #  dockerfile: Dockerfile
        image: ghcr.io/datadog/dd-trace-py/testrunner:4d842eb2d0671790e4dc3e30309a8e3ffe91ac8b
        command: bash
        # Resource limits: defaults to 0 (unlimited, uses all available system resources)
        # Set DD_TEST_CPUS (e.g., "4") and DD_TEST_MEMORY (e.g., "8g") to apply limits
        cpus: "${DD_TEST_CPUS:-0}"
        mem_limit: "${DD_TEST_MEMORY:-0}"
        cap_add:
          - SYS_PTRACE
          - SYS_ADMIN
        environment:
          DD_FAST_BUILD: "1"
          CMAKE_BUILD_PARALLEL_LEVEL: "12"
          CARGO_BUILD_JOBS: "12"
          CYTHON_CACHE_DIR: "/home/bits/.cache/cython"
          DD_USE_SCCACHE: "1"
          SCCACHE_DIR: "/home/bits/.cache/sccache"
          DD_PROFILING_MEMALLOC_ASSERT_ON_REENTRY: "1"
        network_mode: host
        userns_mode: host
        working_dir: /home/bits/project/
        volumes:
          - ddagent:/tmp/ddagent
          - ${DD_TEST_CACHE_DIR:-./.cache}:/home/bits/.cache
          - ./:/home/bits/project
    localstack:
        image: localstack/localstack:4.14.0
        environment:
          - SERVICES=${SERVICES- }
          - DEBUG=${DEBUG- }
          - LAMBDA_EXECUTOR=local
          - KINESIS_ERROR_PROBABILITY=${KINESIS_ERROR_PROBABILITY- }
          - DOCKER_HOST=unix:///var/run/docker.sock
        volumes:
          - "${TMPDIR:-/var/lib/localstack}:/var/lib/localstack"
          - "/var/run/docker.sock:/var/run/docker.sock"
        network_mode: host
    httpbin:
      image: kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b
      platform: linux/amd64
      # Match the normal Compose endpoint (127.0.0.1:8001 -> container:80).
      command: ["gunicorn", "-b", "127.0.0.1:8001", "httpbin:app", "-k", "gevent"]
      network_mode: host
    valkey:
        image: valkey/valkey:9.1-alpine
        network_mode: host
    pubsub:
        image: google/cloud-sdk:573.0.0-emulators
        command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
        network_mode: host
    valkeycluster:
        platform: linux/amd64
        image: grokzen/redis-cluster:7.2.5
        environment:
            - IP=0.0.0.0
        network_mode: host

volumes:
    ddagent:
