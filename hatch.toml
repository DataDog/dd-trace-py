[envs.lint]
detached = true
python = "3.10"
dependencies = [
    "click==8.1.7",
    "cython-lint==0.18.1",
    "codespell==2.4.1",
    "bandit==1.8.2",
    "mypy==1.15.0",
    "coverage==7.3.0",
    "envier==0.6.1",
    "types-docutils==0.19.1.1",
    "types-protobuf==3.20.4.5",
    "types-PyYAML==6.0.12.2",
    "types-setuptools==65.6.0.0",
    "ddapm-test-agent==1.43.0",
    "packaging==23.1",
    "pygments==2.16.1",
    "riot==0.21.0",
    "ruff==0.14.10",
    "clang-format==18.1.5",
    "cmake-format==0.6.13",
    "ruamel.yaml==0.18.6",
    "ast-grep-cli==0.39.4",
]

[envs.lint.scripts]
format_check = [
    "ruff format --check --no-cache {args:.}",
]
cmakeformat_check = [
    "bash scripts/cmake-format.sh"
]
cformat_check = [
    "bash scripts/cformat.sh"
]
hook_tests = [
    "bash hooks/tests/test-run-fmt.sh",
    "bash hooks/tests/test-run-fmt-cython-lint.sh",
]
style = [
    "format_check",
    "ruff check --no-cache {args:.}",
    "cython-lint {args:.}",
    "cformat_check",
    "cmakeformat_check",
    "hook_tests",
]
fmt = [
    "ruff format --no-cache {args:.}",
    "ruff check --fix --no-cache {args:.}",
    "style",
]
ruff-fix = [
    "ruff check --fix --show-fixes --no-cache {args:.}",
]
# Pre-commit: format + lint in one pass (no redundant checks). Replaces separate fmt + ruff hooks.
# cython-lint catches E711 and other rules ruff may not; runs on .py and .pyx files.
pre-commit-python = [
    "ruff format --no-cache {args:.}",
    "ruff check --fix --show-fixes --no-cache {args:.}",
    "cython-lint {args:.}",
]
# checks should encapsulate all rules used in pre-check
checks = [
    "style",
    "typing",
    "spelling",
    "riot",
    "security",
    "test",
    "suitespec-check",
    "profiling-native-check",
    "error-log-check",
    "sg",
    "sg-test",
]
spelling = [
    "codespell -I docs/spelling_wordlist.txt --skip='ddwaf.h,*cassettes*,tests/tracer/fixtures/urls.txt,tests/appsec/iast/fixtures/*' {args:ddtrace/ tests/ releasenotes/ docs/}",
]
typing = [
    "mypy {args}",
]
security = [
    "bandit -c pyproject.toml {args:-r ddtrace/}",
]
fmt-snapshots = [
    "ddapm-test-agent-fmt {args:tests/snapshots/}",
]
riot = [
    "python -m doctest {args} riotfile.py"
]
suitespec-check = [
    "python scripts/check_suitespec_coverage.py"
]
profiling-native-check = [
    "python scripts/check_profiling_native_coverage.py"
]
error-log-check = [
    "python scripts/check_constant_log_message.py"
]
sg = [
    "ast-grep scan {args:.}",
]
sg-test = [
    "ast-grep test {args}",
]
ci-deps-check = [
    "bash scripts/check-ci-dependencies",
]

[envs.clean]
detached = true
python = "3.10"
# setup.py requires these at import time; needed to run python setup.py clean --all
dependencies = [
    "cython",
    "cmake>=3.24.2,<3.28",
    "setuptools-rust<2",
    "setuptools-scm[toml]>=4",
]

[envs.clean.scripts]
all = [
    "python setup.py clean --all",
]

